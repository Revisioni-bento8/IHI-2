Une OI peut exercer des pouvoirs non expressément prévus dans le traité constitutif s’ils sont nécessaires pour réaliser ses objectifs", "isCorrect": true}, {"text": "B. Les pouvoirs implicites ont été reconnus par la CIJ dans l’avis consultatif Réparation des dommages (1949)", "isCorrect": true}, {"text": "C. Ils permettent à une OI de faire n’importe quoi, même sans lien avec ses fonctions", "isCorrect": false}, {"text": "D. Ils sont instrumentaux et fonctionnels aux buts de l’organisation", "isCorrect": true}, {"text": "E. Ils sont entièrement équivalents à la compétence générale d’un État souverain", "isCorrect": false}], "explanation": "Les pouvoirs implicites sont fonctionnels aux objectifs de l’OI (avis CIJ de 1949) ; ils ne sont ni illimités ni équivalents à la compétence générale d’un État."}, {"id": "builtin_qcm_34", "q": "Quelles affirmations sur le fait internationalement illicite (FII) comme source de responsabilité internationale sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Il requiert une violation d’une obligation internationale imputable à l’État", "isCorrect": true}, {"text": "B. L’illicéité présuppose toujours un élément subjectif (dol ou faute)", "isCorrect": false}, {"text": "C. Un comportement est imputable à l’État s’il est accompli par ses organes ou agents dans l’exercice de leurs fonctions", "isCorrect": true}, {"text": "D. Des comportements ultra vires (au-delà des pouvoirs conférés) peuvent aussi être imputés à l’État", "isCorrect": true}, {"text": "E. La responsabilité s’éteint automatiquement si l’État fait cesser la violation", "isCorrect": false}], "explanation": "Le FII requiert la violation d’une obligation imputable à l’État ; pas besoin de dol ou de faute (responsabilité objective) ; les comportements ultra vires restent imputables ; la cessation n’efface pas l’obligation de réparation."}, {"id": "builtin_qcm_35", "q": "Concernant l’imputation d’un comportement à l’État, quels cas sont correctement décrits ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Les actes des organes de jure (prévus par l’ordre interne) sont toujours imputables à l’État", "isCorrect": true}, {"text": "B. Les actes des organes de facto (par ex. milices agissant sous le contrôle effectif de l’État) peuvent être imputables", "isCorrect": true}, {"text": "C. Les comportements de personnes privées ne sont jamais imputables à l’État", "isCorrect": false}, {"text": "D. L’aide ou l’assistance à un autre État dans la commission d’un FII peut engager la responsabilité de l’État assistant", "isCorrect": true}, {"text": "E. Le comportement d’un organe prêté à une autre OI reste toujours imputable à l’État prêteur", "isCorrect": false}], "explanation": "Les organes de jure et de facto peuvent être imputables ; la complicité est pertinente ; les actes de privés sont exceptionnellement imputables (par ex. adoption par l’État) ; l’imputation d’organes prêtés dépend du contrôle effectif."}, {"id": "builtin_qcm_36", "q": "Quelles circonstances excluent l’illicéité (CEI) d’un acte par ailleurs contraire au droit international ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le consentement de l’État lésé", "isCorrect": true}, {"text": "B. La légitime défense conforme à l’art. 51 de la Charte de l’ONU", "isCorrect": true}, {"text": "C. Les contre-mesures prises en réponse à un FII de l’autre État", "isCorrect": true}, {"text": "D. La force majeure (événement irrésistible externe rendant l’exécution impossible)", "isCorrect": true}, {"text": "E. La pression politique ou économique interne", "isCorrect": false}], "explanation": "Les CEI codifiées sont : consentement, légitime défense, contre-mesures, force majeure, état de nécessité et détresse ; la pression interne n’est pas une CEI."}, {"id": "builtin_qcm_37", "q": "Quelles sont les conditions cumulatives de l’état de nécessité comme circonstance excluant l’illicéité ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Il doit exister un intérêt essentiel de l’État à protéger", "isCorrect": true}, {"text": "B. Il doit y avoir un péril grave et imminent", "isCorrect": true}, {"text": "C. L’acte doit être le seul moyen disponible pour protéger l’intérêt essentiel", "isCorrect": true}, {"text": "D. L’État ne doit pas avoir contribué à la survenance de l’état de nécessité", "isCorrect": true}, {"text": "E. L’acte ne doit pas violer une obligation de jus cogens", "isCorrect": true}], "explanation": "Toutes ces conditions sont cumulatives (art. 25 du projet de la CDI) : intérêt essentiel, péril grave et imminent, unique moyen, absence de contribution, respect du jus cogens."}, {"id": "builtin_qcm_38", "q": "Concernant la réparation en cas de responsabilité internationale, quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La restitution est la modalité primaire : elle vise à rétablir la situation antérieure à la violation", "isCorrect": true}, {"text": "B. L’indemnisation couvre les dommages pécuniaires quantifiables, y compris le gain manqué", "isCorrect": true}, {"text": "C. La satisfaction est la modalité prévue pour les dommages moraux ou non pécuniaires (par ex. excuses officielles)", "isCorrect": true}, {"text": "D. L’État lésé peut toujours choisir librement entre restitution et indemnisation", "isCorrect": false}, {"text": "E. La cessation est une conséquence spéciale pertinente en cas de violations continues", "isCorrect": true}], "explanation": "La restitution est primaire, l’indemnisation couvre les dommages pécuniaires, la satisfaction vise les dommages moraux, la cessation concerne les violations continues ; l’État responsable ne peut pas librement substituer l’indemnisation à la restitution."}, {"id": "builtin_qcm_39", "q": "Quelles conditions doivent respecter les contre-mesures pour être licites en droit international ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elles ne peuvent justifier un FII qu’à l’égard de l’État violateur, non à l’égard d’États tiers", "isCorrect": true}, {"text": "B. Elles doivent être proportionnelles au tort subi", "isCorrect": true}, {"text": "C. Elles doivent avoir pour but de ramener à la légalité, et non de punir", "isCorrect": true}, {"text": "D. Elles sont admises même si elles impliquent l’usage de la force armée", "isCorrect": false}, {"text": "E. Elles doivent être précédées d’une sommation à l’État responsable", "isCorrect": true}], "explanation": "Les contre-mesures doivent être dirigées uniquement contre l’État violateur, être proportionnelles, viser le rétablissement de la légalité et être précédées d’une sommation ; l’usage de la force armée est exclu."}, {"id": "builtin_qcm_40", "q": "Quelles affirmations sur la protection diplomatique sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elle permet à un État de faire valoir la responsabilité internationale d’un autre État pour des dommages subis par ses ressortissants", "isCorrect": true}, {"text": "B. Elle exige que la personne lésée ait la nationalité de l’État protecteur au moment du FII et de manière continue jusqu’à la décision", "isCorrect": true}, {"text": "C. Elle est conditionnée à l’épuisement des recours internes disponibles dans l’État responsable", "isCorrect": true}, {"text": "D. L’État est obligé d’exercer la protection diplomatique lorsque le ressortissant le demande", "isCorrect": false}, {"text": "E. Les doubles nationaux peuvent être protégés par chacun de leurs États de nationalité contre l’autre", "isCorrect": false}], "explanation": "La protection diplomatique exige une nationalité continue et l’épuisement des recours internes ; l’État dispose d’un pouvoir discrétionnaire (pas d’obligation) ; la protection de doubles nationaux contre un État dont ils sont aussi ressortissants est en principe exclue."}, {"id": "builtin_qcm_41", "q": "Concernant la compétence ratione personae de la CIJ en matière contentieuse, quelles propositions sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Seuls les États peuvent être parties aux procédures contentieuses devant la CIJ", "isCorrect": true}, {"text": "B. Tous les États membres de l’ONU sont automatiquement parties au Statut de la CIJ", "isCorrect": true}, {"text": "C. Une organisation internationale peut introduire une requête contentieuse devant la CIJ", "isCorrect": false}, {"text": "D. Un État non partie au Statut peut comparaître devant la CIJ sous certaines conditions", "isCorrect": true}, {"text": "E. Les individus peuvent saisir directement la CIJ s’ils sont victimes de violations du droit international", "isCorrect": false}], "explanation": "Seuls les États sont parties en matière contentieuse ; les membres de l’ONU sont automatiquement parties au Statut ; les États non parties peuvent accéder sous conditions (acceptation de la décision obligatoire) ; les OI et les individus sont exclus."}, {"id": "builtin_qcm_42", "q": "Quels sont les titres de compétence de la CIJ en matière contentieuse ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Clauses compromissoires insérées dans des traités conférant compétence à la Cour pour les différends relatifs à ce traité", "isCorrect": true}, {"text": "B. Accords généraux de règlement des différends (compétence générale)", "isCorrect": true}, {"text": "C. Déclaration facultative de juridiction obligatoire (clause facultative)", "isCorrect": true}, {"text": "D. Compromis spécial conclu entre les parties après la naissance du différend", "isCorrect": true}, {"text": "E. La simple ratification du Statut de la CIJ par les deux États en cause", "isCorrect": false}], "explanation": "Les titres sont : clauses compromissoires, accords généraux de RdD, déclaration facultative et compromis spécial ; la simple participation au Statut ne suffit pas à conférer compétence."}, {"id": "builtin_qcm_43", "q": "Concernant la déclaration facultative de juridiction obligatoire (art. 36 §2 du Statut de l t ; le problème disparaît si l’État tiers consent."}, {"id": "builtin_qcm_45", "q": "Concernant les avis consultatifs de la CIJ, quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Ils peuvent être demandés par l’Assemblée générale et le Conseil de sécurité de l’ONU", "isCorrect": true}, {"text": "B. Ils n’ont en principe pas de force exécutoire", "isCorrect": true}, {"text": "C. Ils peuvent être demandés directement par tout État membre de l’ONU", "isCorrect": false}, {"text": "D. Ils peuvent devenir contraignants si les parties l’acceptent préalablement", "isCorrect": true}, {"text": "E. La Cour dispose d’un pouvoir discrétionnaire de refus, mais en pratique elle l’exerce rarement", "isCorrect": true}], "explanation": "Les avis consultatifs sont demandés par des organes de l’ONU (et non directement par les États) ; ils ne sont pas contraignants sauf accord préalable ; la Cour refuse rarement de rendre un avis."}, {"id": "builtin_qcm_46", "q": "Quelles affirmations sur le système universel de protection des droits de l’homme dans le cadre des Nations Unies sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le Conseil des droits de l’homme a remplacé l’ancienne Commission des droits de l’homme", "isCorrect": true}, {"text": "B. L’Examen périodique universel (EPU) soumet périodiquement tous les États à un contrôle de leur bilan en matière de droits de l’homme", "isCorrect": true}, {"text": "C. Les comités créés par les traités (Comité contre la torture, etc.) sont composés d’experts indépendants", "isCorrect": true}, {"text": "D. Les rapports et recommandations de ces comités sont toujours juridiquement contraignants pour les États parties", "isCorrect": false}, {"text": "E. Le système universel tend à privilégier les processus diplomatiques et les recommandations plutôt que des arrêts contraignants", "isCorrect": true}], "explanation": "Le Conseil remplace la Commission ; l’EPU est universel ; les  n’est pas nécessairement un génocide ; l’incitation est punissable de manière autonome ; les concours d’infractions sont possibles."}, {"id": "builtin_qcm_49", "q": "Concernant la compétence de la Cour pénale internationale (CPI), quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La CPI est compétente ratione materiae pour le génocide, les crimes contre l’humanité, les crimes de guerre et le crime d’agression", "isCorrect": true}, {"text": "B. La CPI peut poursuivre des États en tant que tels pour des crimes internationaux", "isCorrect": false}, {"text": "C. La compétence est territoriale (crimes commis sur le territoire d’un État partie) et personnelle active (ressortissants d’un État partie)", "isCorrect": true}, {"text": "D. Le Conseil de sécurité peut déférer une situation à la CPI même concernant un État non partie au Statut de Rome", "isCorrect": true}, {"text": "E. Le principe de complémentarité implique que la CPI n’intervient que lorsque les États ne veulent pas ou ne peuvent pas poursuivre les responsables", "isCorrect": true}], "explanation": "La CPI ne juge que des personnes physiques, pas des États ; elle a une compétence territoriale et personnelle active ; le CS peut créer une compétence même pour des États non parties ; la complémentarité est fondamentale."}, {"id": "builtin_qcm_50", "q": "Concernant les tribunaux pénaux internationaux ad hoc (TPIY, TPIR) et la CPI, quelles différences sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Les TPI ad hoc ont été créés par le Conseil de sécurité au moyen de résolutions contraignantes ; la CPI est fondée sur un traité (Statut de Rome)", "isCorrect": true}, {"text": "B. La CPI a une compétence permanente ; les tribunaux ad hoc ont été créés pour des situations spécifiques", "isCorrect": true}, {"text": "C. Les tribunaux ad hoc avaient une compétence prioritaire par rapport aux États ; la CPI a une compétence complémentaire", "isCorrect": true}, {"text": "D. La CPI ne peut jamais poursuivre des crimes commis avant le 1er juillet 2002", "isCorrect": true}, {"text": "E. Les TPI ad hoc comme la CPI ne peuvent juger que des personnes physiques, non des États", "isCorrect": true}], "explanation": "Toutes ces propositions sont correctes : TPI ad hoc créés par le CS vs CPI par traité ; compétence permanente vs situations spécifiques ; priorité vs complémentarité ; non-rétroactivité au-delà du 1er juillet 2002 ; seules des personnes physiques sont jugées."}];

let userData = { title: '', programme: null, customFC: [], customQCM: [], fcStats: {}, qcmStats: {}, errorsFC: [], errorsQCM: [] };
let ALL_FC = [], ALL_QCM = [];

function getKey() { return 'UNIGE_v4_dip'; }
function saveData() { try { localStorage.setItem(getKey(), JSON.stringify(userData)); } catch(e) {} }
function loadData() {
    let saved = null;
    try { saved = localStorage.getItem(getKey()); } catch(e) {}
    if (saved) {
        try {
            const p = JSON.parse(saved);
            userData.title     = p.title     || '';
            userData.programme = p.programme || null;
            userData.customFC  = p.customFC  || [];
            userData.customQCM = p.customQCM || [];
            userData.fcStats   = p.fcStats   || {};
            userData.qcmStats  = p.qcmStats  || {};
            userData.errorsFC  = p.errorsFC  || [];
            userData.errorsQCM = p.errorsQCM || [];
        } catch(e) {}
    }
    userData.customFC.forEach((fc,i)  => { if (!fc.id) fc.id = 'cfc_' + i; });
    userData.customQCM.forEach((q,i)  => { if (!q.id)  q.id  = 'cqcm_' + i; });
    ALL_FC  = [...BUILTIN_FC,  ...userData.customFC];
    ALL_QCM = [...BUILTIN_QCM, ...userData.customQCM];
    renderTitle();
    renderStats();
}

const titleDisplay = document.getElementById('title-display');
const titleInput   = document.getElementById('title-input');
function renderTitle() { titleDisplay.textContent = userData.title || 'DIP'; }
titleDisplay.addEventListener('click', () => {
    titleInput.value = userData.title;
    titleDisplay.classList.add('hidden');
    titleInput.classList.remove('hidden');
    titleInput.focus(); titleInput.select();
});
function commitTitle() {
    const v = titleInput.value.trim();
    if (v) userData.title = v;
    titleInput.classList.add('hidden');
    titleDisplay.classList.remove('hidden');
    renderTitle(); saveData();
}
titleInput.addEventListener('blur', commitTitle);
titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commitTitle(); } });

function toggleStats() {
    document.getElementById('stats-toggle').classList.toggle('open');
    document.getElementById('stats-body').classList.toggle('open');
}

function renderStats() {
    const totalFC = ALL_FC.length, totalQCM = ALL_QCM.length;
    const doneFC  = ALL_FC.filter(fc => userData.fcStats[fc.id]  && userData.fcStats[fc.id].attempts  > 0).length;
    const doneQCM = ALL_QCM.filter(q  => userData.qcmStats[q.id] && userData.qcmStats[q.id].attempts > 0).length;
    let fcC=0,fcA=0,qcmC=0,qcmA=0;
    ALL_FC.forEach(fc  => { const s=userData.fcStats[fc.id];  if(s){fcA+=s.attempts;  fcC+=s.correct;}  });
    ALL_QCM.forEach(q  => { const s=userData.qcmStats[q.id];  if(s){qcmA+=s.attempts; qcmC+=s.correct;} });
    const fcPct  = fcA  > 0 ? Math.round(fcC/fcA*100)   + '% correct' : '';
    const qcmPct = qcmA > 0 ? Math.round(qcmC/qcmA*100) + '% correct' : '';
    document.getElementById('stats-global').innerHTML =
        '<div class="stats-row"><span class="stats-label">Flashcards</span><span class="stats-value">' + doneFC + '/' + totalFC + ' faites' + (fcPct ? ' &mdash; ' + fcPct : '') + '</span></div>' +
        '<div class="stats-row"><span class="stats-label">QCM</span><span class="stats-value">' + doneQCM + '/' + totalQCM + ' faits' + (qcmPct ? ' &mdash; ' + qcmPct : '') + '</span></div>';
    const chapters = {};
    if (userData.programme && Array.isArray(userData.programme.chapters)) {
        userData.programme.chapters.forEach(ch => { chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0}; });
    }
    ALL_FC.forEach(fc => {
        const ch = fc.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0};
        chapters[ch].fcTotal++;
        const s = userData.fcStats[fc.id];
        if (s && s.attempts > 0) { chapters[ch].fcDone++; chapters[ch].fcC+=s.correct; chapters[ch].fcA+=s.attempts; }
    });
    ALL_QCM.forEach(q => {
        const ch = q.ch || q.chapter || 'Autre';
        if (!chapters[ch]) chapters[ch] = {fcTotal:0,fcDone:0,fcC:0,fcA:0,qcmTotal:0,qcmDone:0,qcmC:0,qcmA:0};
        chapters[ch].qcmTotal++;
        const s = userData.qcmStats[q.id];
        if (s && s.attempts > 0) { chapters[ch].qcmDone++; chapters[ch].qcmC+=s.correct; chapters[ch].qcmA+=s.attempts; }
    });
    let chHTML = '';
    if (Object.keys(chapters).length > 0) {
        chHTML += '<div class="chapter-title">Par chapitre</div>';
        Object.entries(chapters).forEach(([ch,d]) => {
            const total=d.fcTotal+d.qcmTotal, done=d.fcDone+d.qcmDone, allA=d.fcA+d.qcmA, allC=d.fcC+d.qcmC;
            const pct = allA > 0 ? Math.round(allC/allA*100)+'%' : '-';
            chHTML += '<div class="chapter-row"><span class="chapter-name">'+ch+'</span><span class="chapter-stats">'+done+'/'+total+' '+pct+'</span></div>';
        });
    }
    document.getElementById('stats-chapters').innerHTML = chHTML;
    const errCount = userData.errorsFC.length + userData.errorsQCM.length;
    document.getElementById('lbl-fc').textContent  = totalFC  + ' cartes';
    document.getElementById('lbl-qcm').textContent = totalQCM + ' questions';
    document.getElementById('lbl-rev').textContent = errCount + ' a corriger';
    document.getElementById('btn-rev').disabled = errCount === 0;
}

const VIEWS = ['view-menu','view-fc','view-qcm','view-end'];
function showView(id) { VIEWS.forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id)); }
function goMenu() { renderStats(); showView('view-menu'); }

let fcPool=[], fcIdx=0, _pendingRevQCM=[];
function startMode(mode) {
    _pendingRevQCM = [];
    if (mode === 'fc') {
        if (!ALL_FC.length) { alert('Aucune flashcard.'); return; }
        fcPool = shuffle([...ALL_FC]); fcIdx = 0; renderFC(); showView('view-fc');
    } else if (mode === 'qcm') {
        if (!ALL_QCM.length) { alert('Aucun QCM.'); return; }
        qcmPool = shuffle([...ALL_QCM]); qcmIdx = 0; renderQCM(); showView('view-qcm');
    } else if (mode === 'rev') {
        const revFC  = ALL_FC.filter(fc => userData.errorsFC.includes(fc.id));
        const revQCM = ALL_QCM.filter(q  => userData.errorsQCM.includes(q.id));
        if (!revFC.length && !revQCM.length) { alert('Aucune erreur.'); return; }
        if (revFC.length) { fcPool = shuffle(revFC); fcIdx = 0; _pendingRevQCM = revQCM; renderFC(); showView('view-fc'); }
        else { qcmPool = shuffle(revQCM); qcmIdx = 0; renderQCM(); showView('view-qcm'); }
    }
}

function renderFC() {
    if (fcIdx >= fcPool.length) {
        if (_pendingRevQCM.length) { qcmPool = shuffle(_pendingRevQCM); _pendingRevQCM = []; qcmIdx = 0; renderQCM(); showView('view-qcm'); return; }
        document.getElementById('end-msg').textContent = fcPool.length + ' flashcard(s) terminees.';
        showView('view-end'); return;
    }
    const fc = fcPool[fcIdx];
    document.getElementById('fc-counter').textContent = 'Carte ' + (fcIdx+1) + ' / ' + fcPool.length;
    document.getElementById('fc-chapter').textContent = fc.chapter || '';
    document.getElementById('fc-q').innerHTML         = fc.q || '';
    document.getElementById('fc-a').innerHTML         = fc.a || '';
    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-eval').classList.add('hidden');
}
function flipFC() {
    const card = document.getElementById('fc-card');
    if (!card.classList.contains('flipped')) { card.classList.add('flipped'); document.getElementById('fc-eval').classList.remove('hidden'); }
}
function evalFC(correct) {
    const fc = fcPool[fcIdx];
    if (!userData.fcStats[fc.id]) userData.fcStats[fc.id] = {attempts:0,correct:0};
    userData.fcStats[fc.id].attempts++;
    if (correct) userData.fcStats[fc.id].correct++;
    userData.errorsFC = userData.errorsFC.filter(id => id !== fc.id);
    if (!correct) userData.errorsFC.push(fc.id);
    saveData(); fcIdx++; renderFC();
}

let qcmPool=[], qcmIdx=0;
function renderQCM() {
    if (qcmIdx >= qcmPool.length) {
        document.getElementById('end-msg').textContent = qcmPool.length + ' question(s) terminees.';
        showView('view-end'); return;
    }
    const q = qcmPool[qcmIdx];
    document.getElementById('qcm-counter').textContent = 'Question ' + (qcmIdx+1) + ' / ' + qcmPool.length;
    document.getElementById('qcm-chapter').textContent = q.ch || q.chapter || '';
    document.getElementById('qcm-q').innerHTML         = q.q || '';
    const optsEl = document.getElementById('qcm-opts');
    optsEl.innerHTML = '';
    const isMulti = q.fmt === 'multiple';
    (q.options||[]).forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'qcm-opt';
        div.innerHTML = '<input type="' + (isMulti?'checkbox':'radio') + '" name="qans" id="opt'+i+'" value="'+i+'"><label for="opt'+i+'">' + opt.text + '</label>';
        div.addEventListener('click', e => {
            if (e.target.tagName === 'INPUT') return;
            const inp = div.querySelector('input');
            if (isMulti) { inp.checked = !inp.checked; div.classList.toggle('selected', inp.checked); }
            else {
                document.querySelectorAll('.qcm-opt').forEach(d => { d.classList.remove('selected'); d.querySelector('input').checked = false; });
                inp.checked = true; div.classList.add('selected');
            }
        });
        optsEl.appendChild(div);
    });
    document.getElementById('btn-valider').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('qcm-feedback').style.display = 'none';
}
function validerQCM() {
    const q = qcmPool[qcmIdx];
    const optDivs = document.querySelectorAll('.qcm-opt');
    let correct = true;
    optDivs.forEach((div, i) => {
        const inp = div.querySelector('input');
        const isChecked = inp.checked;
        const isCorrect = q.options[i].isCorrect;
        if (isCorrect !== isChecked) correct = false;
        if (isCorrect) div.classList.add('correct');
        else if (isChecked) div.classList.add('wrong');
        inp.disabled = true; div.style.pointerEvents = 'none';
    });
    if (!userData.qcmStats[q.id]) userData.qcmStats[q.id] = {attempts:0,correct:0};
    userData.qcmStats[q.id].attempts++;
    if (correct) userData.qcmStats[q.id].correct++;
    userData.errorsQCM = userData.errorsQCM.filter(id => id !== q.id);
    if (!correct) userData.errorsQCM.push(q.id);
    saveData();
    const fb = document.getElementById('qcm-feedback');
    fb.innerHTML = '<div class="fb-label">' + (correct ? 'Correct.' : 'Incorrect.') + '</div><div class="fb-exp">' + (q.explanation||'') + '</div>';
    fb.style.display = 'block';
    document.getElementById('btn-valider').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
}
function nextQCM() { qcmIdx++; renderQCM(); }

function openAddon()  { document.getElementById('addon-modal').classList.add('open'); }
function closeAddon() { document.getElementById('addon-modal').classList.remove('open'); document.getElementById('addon-text').value = ''; }


function convertFlashcardFormat(arr) {
    return arr.map((item, i) => ({
        id: item.id ? 'cfc_' + item.id : 'cfc_' + Date.now() + '_' + i,
        q: item.question || item.q || '',
        a: item.answer   || item.a || '',
        ch: item.ch || item.chapter || 'DIP'
    }));
}

function convertOriginalFormat(arr) {
    return arr.map((item, i) => {
        const opts = [];
        if (item.options && !Array.isArray(item.options)) {
            ['A','B','C','D','E','F'].forEach(letter => {
                if (item.options[letter] !== undefined) {
                    opts.push({
                        text: letter + '. ' + item.options[letter],
                        isCorrect: Array.isArray(item.correct_options)
                            ? item.correct_options.includes(letter)
                            : item.correct_option === letter
                    });
                }
            });
        }
        const correctCount = opts.filter(o => o.isCorrect).length;
        return {
            id: item.id ? 'cqcm_' + item.id : 'cqcm_' + Date.now() + '_' + i,
            q: item.question || item.q || '',
            ch: item.ch || item.chapter || 'DIP',
            fmt: correctCount > 1 ? 'multiple' : 'single',
            options: opts,
            explanation: item.explanation || ''
        };
    });
}

function processAddon() {
    const text = document.getElementById('addon-text').value.trim();
    if (!text) return;
    try {
        const data = JSON.parse(text);
        let nFC=0, nQCM=0, hasProgramme=false;

        // Format: { programme: {...}, flashcards: [...], qcm: [...] }
        if (!Array.isArray(data) && data.programme) { userData.programme = data.programme; hasProgramme = true; }
        if (!Array.isArray(data) && Array.isArray(data.flashcards)) {
            data.flashcards.forEach((fc, i) => { if (!fc.id) fc.id = 'cfc_' + Date.now() + '_' + i; userData.customFC.push(fc); nFC++; });
        }
        if (!Array.isArray(data) && Array.isArray(data.qcm)) {
            data.qcm.forEach((q, i) => { if (!q.id) q.id = 'cqcm_' + Date.now() + '_' + i; userData.customQCM.push(q); nQCM++; });
        }

        // Format: plain array — detect by content
        if (Array.isArray(data) && data.length > 0) {
            const first = data[0];
            // Flashcard: has 'answer' or 'a' but NOT 'correct_options' or 'options'
            const isFlashcard = (first.answer !== undefined || first.a !== undefined) &&
                                 first.correct_options === undefined && first.options === undefined;
            if (isFlashcard) {
                const converted = convertFlashcardFormat(data);
                converted.forEach(fc => { userData.customFC.push(fc); nFC++; });
            } else {
                // QCM: has 'question'/'options'/'correct_options'
                const converted = convertOriginalFormat(data);
                converted.forEach(q => { userData.customQCM.push(q); nQCM++; });
            }
        }

        ALL_FC  = [...BUILTIN_FC,  ...userData.customFC];
        ALL_QCM = [...BUILTIN_QCM, ...userData.customQCM];
        saveData(); renderStats(); closeAddon();

        let msg = '';
        if (hasProgramme) msg += 'Programme chargé. ';
        if (nFC)  msg += nFC  + ' flashcard(s) ajoutée(s). ';
        if (nQCM) msg += nQCM + ' QCM ajouté(s).';
        if (!msg) msg = 'Aucun contenu reconnu.';
        alert(msg);
    } catch(e) {
        alert('JSON invalide: ' + e.message);
    }
}

document.getElementById('btn-theme').addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('btn-theme').textContent = isDark ? 'Nuit' : 'Jour';
    try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch(e) {}
});

function shuffle(arr) {
    for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

window.addEventListener('load', () => {
    try {
        const t = localStorage.getItem('theme');
        if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('btn-theme').textContent = 'Jour'; }
    } catch(e) {}
    loadData();
});
