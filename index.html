<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHI 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #ffffff;
            --surface: #f5f5f5;
            --border:  #e0e0e0;
            --border2: #bdbdbd;
            --text:    #111111;
            --muted:   #666666;
            --faint:   #999999;
        }
        [data-theme="dark"] {
            --bg:      #111111;
            --surface: #1c1c1c;
            --border:  #2a2a2a;
            --border2: #444444;
            --text:    #f0f0f0;
            --muted:   #999999;
            --faint:   #666666;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: none; }
        body {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            transition: background 0.2s, color 0.2s;
        }
        #app { max-width: 680px; margin: 0 auto; border: 1px solid var(--border); }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        #title-display {
            font-size: 15px; font-weight: 700; cursor: pointer;
            border-bottom: 1px dashed var(--border2); min-width: 60px;
        }
        #title-display:hover { border-bottom-color: var(--text); }
        #title-input {
            font-size: 15px; font-weight: 700;
            border: none; border-bottom: 2px solid var(--text);
            background: transparent; color: var(--text);
            outline: none; width: 200px; font-family: inherit;
        }
        .hbtn {
            background: none; border: 1px solid var(--border2);
            color: var(--muted); font-size: 12px; padding: 4px 10px;
            cursor: pointer; font-family: inherit; font-weight: 500;
        }
        .hbtn:hover { color: var(--text); border-color: var(--text); }
        main { padding: 28px 20px; min-height: 50vh; }
        .stats-accordion { border: 1px solid var(--border); margin-bottom: 20px; }
        .stats-toggle {
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 14px 18px;
            background: var(--surface); border: none;
            font-family: inherit; font-size: 13px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase;
            cursor: pointer; text-align: left;
        }
        .stats-toggle:hover { color: var(--text); }
        .stats-toggle .arrow { font-size: 11px; transition: transform 0.2s; }
        .stats-toggle.open .arrow { transform: rotate(180deg); }
        .stats-body { display: none; padding: 16px 18px; border-top: 1px solid var(--border); }
        .stats-body.open { display: block; }
        .stats-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
        .stats-row:last-child { border-bottom: none; }
        .stats-label { color: var(--muted); }
        .stats-value { font-weight: 600; }
        .chapter-section { margin-top: 14px; }
        .chapter-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
        .chapter-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .chapter-row:last-child { border-bottom: none; }
        .chapter-name { color: var(--muted); font-style: italic; }
        .chapter-stats { font-weight: 600; text-align: right; white-space: nowrap; }
        .menu-list { display: flex; flex-direction: column; border: 1px solid var(--border); }
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px; font-size: 15px; font-weight: 600;
            cursor: pointer; background: var(--bg); border: none;
            color: var(--text); text-align: left;
            border-bottom: 1px solid var(--border);
            font-family: inherit; width: 100%; transition: background 0.15s;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--surface); }
        .menu-item:disabled { opacity: 0.35; cursor: not-allowed; }
        .menu-item-right { font-size: 12px; font-weight: 400; color: var(--muted); }
        .counter { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 20px; }
        .fc-area { perspective: 1200px; height: 300px; margin-bottom: 20px; }
        .fc-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
        .fc-card.flipped { transform: rotateY(180deg); }
        .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border: 1px solid var(--border); padding: 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: var(--bg); overflow-y: auto; }
        .fc-back { transform: rotateY(180deg); background: var(--surface); }
        .fc-face h3 { font-size: 16px; font-weight: 600; line-height: 1.5; }
        .fc-hint { font-size: 11px; color: var(--faint); margin-top: 16px; letter-spacing: 0.05em; }
        .fc-chapter { font-size: 11px; color: var(--faint); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
        .eval-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .eval-row button { flex: 1; }
        .btn { padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--bg); color: var(--text); width: 100%; transition: background 0.15s; }
        .btn:hover { background: var(--surface); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-fill { background: var(--text); color: var(--bg); border-color: var(--text); }
        .btn-fill:hover { opacity: 0.85; background: var(--text); }
        .btn-back { margin-top: 12px; border-color: var(--border); color: var(--muted); }
        .btn-back:hover { color: var(--text); border-color: var(--border2); }
        .qcm-chapter { font-size: 11px; color: var(--faint); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
        .qcm-question { font-size: 16px; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }
        .qcm-opt { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: background 0.1s, border-color 0.1s; background: var(--bg); }
        .qcm-opt:hover { background: var(--surface); }
        .qcm-opt input { margin-top: 3px; flex-shrink: 0; }
        .qcm-opt label { cursor: pointer; font-size: 14px; line-height: 1.5; }
        .qcm-opt.selected { border-color: var(--border2); background: var(--surface); }
        .qcm-opt.correct { border-color: var(--text); background: var(--surface); }
        .qcm-opt.correct label::after { content: " v"; font-weight: 700; }
        .qcm-opt.wrong label::after { content: " x"; color: var(--muted); }
        .qcm-feedback { margin-top: 16px; padding: 14px; border: 1px solid var(--border); font-size: 14px; background: var(--surface); display: none; }
        .qcm-feedback .fb-label { font-weight: 700; margin-bottom: 6px; }
        .qcm-feedback .fb-exp { color: var(--muted); }
        #addon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #addon-modal.open { display: flex; }
        .modal-box { background: var(--bg); border: 1px solid var(--border); max-width: 560px; width: 100%; padding: 24px; }
        .modal-box h3 { font-size: 16px; margin-bottom: 6px; }
        .modal-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        .modal-box textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: monospace; font-size: 12px; resize: vertical; margin-bottom: 16px; }
        .modal-row { display: flex; gap: 10px; }
        .modal-row .btn { margin: 0; }
        .end-box { text-align: center; padding: 40px 20px; }
        .end-box h2 { font-size: 22px; margin-bottom: 12px; }
        .end-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
        .hidden { display: none !important; }
        .mt12 { margin-top: 12px; }
    </style>
</head>
<body>
<div id="app">
    <header>
        <div id="title-area">
            <span id="title-display" title="Touchez pour modifier"></span>
            <input id="title-input" type="text" class="hidden" maxlength="50" placeholder="Nom de la matiere...">
        </div>
        <button class="hbtn" id="btn-theme">Nuit</button>
    </header>
    <main>
        <div id="view-menu">
            <div class="stats-accordion">
                <button class="stats-toggle" id="stats-toggle" onclick="toggleStats()">
                    Statistiques <span class="arrow">&#9660;</span>
                </button>
                <div class="stats-body" id="stats-body">
                    <div id="stats-global"></div>
                    <div class="chapter-section" id="stats-chapters"></div>
                </div>
            </div>
            <div class="menu-list">
                <button class="menu-item" onclick="startMode('fc')">Flashcards <span class="menu-item-right" id="lbl-fc">-</span></button>
                <button class="menu-item" onclick="startMode('qcm')">QCM <span class="menu-item-right" id="lbl-qcm">-</span></button>
                <button class="menu-item" id="btn-rev" onclick="startMode('rev')">Revision des erreurs <span class="menu-item-right" id="lbl-rev">-</span></button>
                <button class="menu-item" onclick="openAddon()">Implementation <span class="menu-item-right">Ajouter du contenu</span></button>
            </div>
        </div>
        <div id="view-fc" class="hidden">
            <div class="counter" id="fc-counter">Carte 1 / -</div>
            <div class="fc-area">
                <div class="fc-card" id="fc-card" onclick="flipFC()">
                    <div class="fc-face fc-front">
                        <div class="fc-chapter" id="fc-chapter"></div>
                        <h3 id="fc-q"></h3>
                        <p class="fc-hint">Touchez pour retourner</p>
                    </div>
                    <div class="fc-face fc-back">
                        <div id="fc-a"></div>
                    </div>
                </div>
            </div>
            <div class="eval-row hidden" id="fc-eval">
                <button class="btn" onclick="evalFC(false)">A revoir</button>
                <button class="btn btn-fill" onclick="evalFC(true)">Je sais</button>
            </div>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>
        <div id="view-qcm" class="hidden">
            <div class="counter" id="qcm-counter">Question 1 / -</div>
            <div class="qcm-chapter" id="qcm-chapter"></div>
            <div class="qcm-question" id="qcm-q"></div>
            <div id="qcm-opts"></div>
            <button class="btn btn-fill mt12" id="btn-valider" onclick="validerQCM()">Valider</button>
            <div class="qcm-feedback" id="qcm-feedback"></div>
            <button class="btn mt12 hidden" id="btn-next" onclick="nextQCM()">Question suivante</button>
            <button class="btn btn-back" onclick="goMenu()">Retour</button>
        </div>
        <div id="view-end" class="hidden">
            <div class="end-box">
                <h2>Session terminee</h2>
                <p id="end-msg"></p>
                <button class="btn btn-fill" onclick="goMenu()">Retour au menu</button>
            </div>
        </div>
    </main>
</div>
<div id="addon-modal">
    <div class="modal-box">
        <h3>Implementation</h3>
        <p class="modal-desc">Collez le JSON. Formats acceptes: format standard du simulateur OU format original (tableau avec question/options/correct_options).</p>
        <textarea id="addon-text" placeholder='[{"id":1,"question":"...","options":{"A":"..."},"correct_options":["A"],"explanation":"..."}]'></textarea>
        <div class="modal-row">
            <button class="btn" onclick="closeAddon()">Annuler</button>
            <button class="btn btn-fill" onclick="processAddon()">Ajouter</button>
        </div>
    </div>
</div>
<script>

const BUILTIN_FC  = [{"id": "builtin_fc_1", "q": "Quelle est la définition du Droit International Public (DIP) ?", "a": "Ensemble de normes régissant principalement les rapports entre États souverains et d'autres sujets internationaux (OI, individus), sans autorité centrale ni police. C'est un droit de coordination.", "ch": "DIP"}, {"id": "builtin_fc_2", "q": "Quelle est la différence entre le droit international classique et le droit international moderne ?", "a": "Le classique est un droit de coexistence entre États souverains (XIXe s.) ; le moderne est aussi un droit de coopération, avec de nouveaux sujets, des organisations internationales et la protection des droits individuels (post-1945).", "ch": "DIP"}, {"id": "builtin_fc_3", "q": "Quelles sont les sources formelles du DIP selon l'art. 38 §1 du Statut de la CIJ ?", "a": "1) Traités internationaux, 2) Coutume internationale, 3) Principes généraux de droit. La jurisprudence et la doctrine sont des moyens auxiliaires, non des sources autonomes.", "ch": "DIP"}, {"id": "builtin_fc_4", "q": "Qu'est-ce que le jus cogens ?", "a": "Normes impératives du DI général auxquelles aucune dérogation n'est permise. Un traité contraire est nul (nullité absolue). Une nouvelle norme de jus cogens éteint les traités préexistants incompatibles.", "ch": "DIP"}, {"id": "builtin_fc_5", "q": "Qu'est-ce que le principe 'pacta sunt servanda' ?", "a": "Tout traité en vigueur lie les parties, qui doivent l'exécuter de bonne foi (art. 26 CVDT). Un État ne peut pas invoquer son droit interne pour justifier l'inexécution (art. 27 CVDT).", "ch": "DIP"}, {"id": "builtin_fc_6", "q": "Quelle est la différence entre la CVDT de 1969 et celle de 1986 ?", "a": "CVDT 1969 : régit les traités entre États, est en vigueur. CVDT 1986 : étend les règles aux traités entre OI ou entre OI et États, n'est pas encore entrée en vigueur. À titre résiduel, le droit coutumier s'applique.", "ch": "DIP"}, {"id": "builtin_fc_7", "q": "Quelles sont les phases classiques de conclusion d'un traité multilatéral ?", "a": "1) Négociation, 2) Adoption du texte (authentification/paraphe), 3) Signature, 4) Ratification/Adhésion, 5) Entrée en vigueur. L'enregistrement auprès de l'ONU n'est pas une condition de validité.", "ch": "DIP"}, {"id": "builtin_fc_8", "q": "Quelle est l'obligation d'un État qui a signé mais pas encore ratifié un traité ?", "a": "Il doit s'abstenir d'actes qui priveraient le traité de son objet et de son but (art. 18 CVDT). Il n'est pas encore pleinement lié par les dispositions substantielles.", "ch": "DIP"}, {"id": "builtin_fc_9", "q": "Qu'est-ce qu'une réserve à un traité ?", "a": "Déclaration unilatérale par laquelle un État, au moment de la signature/ratification/adhésion, exclut ou modifie l'effet juridique de certaines dispositions à son égard. Elle n'est pas admise si elle est incompatible avec l'objet et le but du traité.", "ch": "DIP"}, {"id": "builtin_fc_10", "q": "Quels sont les effets d'une objection simple à une réserve ?", "a": "La disposition visée par la réserve ne s'applique pas dans les relations bilatérales entre l'État réservant et l'État objectant. Le traité entre néanmoins en vigueur entre les deux.", "ch": "DIP"}, {"id": "builtin_fc_11", "q": "Quels sont les effets d'une objection radicale (opposition avec refus d'entrée en vigueur) à une réserve ?", "a": "Le traité n'entre pas en vigueur entre l'État réservant et l'État objectant. C'est l'effet le plus radical de l'objection.", "ch": "DIP"}, {"id": "builtin_fc_12", "q": "Que signifie que les réserves sont 'soumises à réciprocité' ?", "a": "Un État n'ayant pas formulé de réserves peut invoquer à son profit les réserves contenues dans la déclaration de la partie adverse, afin de garantir l'égalité de traitement processuelle.", "ch": "DIP"}, {"id": "builtin_fc_13", "q": "Quels sont les motifs de nullité absolue d'un traité ?", "a": "1) Contrainte exercée sur l'État par la menace ou l'emploi de la force, 2) Contrariété à une norme de jus cogens. La nullité opère de plein droit, sans qu'il soit nécessaire de l'invoquer.", "ch": "DIP"}, {"id": "builtin_fc_14", "q": "Quels sont les motifs de nullité relative d'un traité ?", "a": "1) Erreur fondamentale, 2) Dol, 3) Corruption du représentant, 4) Violation manifeste d'une norme fondamentale de droit interne sur la compétence pour conclure des traités. Ils doivent être invoqués par l'État concerné.", "ch": "DIP"}, {"id": "builtin_fc_15", "q": "Qu'est-ce que le principe 'rebus sic stantibus' (art. 62 CVDT) ?", "a": "Changement fondamental de circonstances par rapport à celles existant lors de la conclusion du traité. Conditions cumulatives : les circonstances étaient la base essentielle du consentement, le changement est radical et imprévu. Non applicable aux traités de frontière.", "ch": "DIP"}, {"id": "builtin_fc_16", "q": "Comment distingue-t-on l'extinction de la suspension d'un traité ?", "a": "L'extinction met fin définitivement au traité ; la suspension en interrompt temporairement l'application entre les parties concernées, sans l'éliminer.", "ch": "DIP"}, {"id": "builtin_fc_17", "q": "Qu'est-ce que la règle d'interprétation de l'effet utile ?", "a": "Parmi plusieurs interprétations possibles, on privilégie celle qui attribue un sens utile et efficace aux termes du traité, plutôt que celle qui les priverait d'effet.", "ch": "DIP"}, {"id": "builtin_fc_18", "q": "Que sont les travaux préparatoires dans l'interprétation des traités ?", "a": "Les travaux préparatoires (négociations, projets, déclarations faites lors des négociations) sont des moyens complémentaires d'interprétation au sens de l'art. 32 CVDT : on y recourt pour confirmer ou clarifier le sens lorsque le texte est ambigu ou obscur.", "ch": "DIP"}, {"id": "builtin_fc_19", "q": "Quels sont les deux éléments constitutifs de la coutume internationale ?", "a": "1) Une pratique générale, uniforme et constante des États (élément matériel), 2) L'opinio juris : conviction que la pratique est juridiquement obligatoire (élément psychologique).", "ch": "DIP"}, {"id": "builtin_fc_20", "q": "Qu'est-ce que l'objecteur persistant dans la formation coutumière ?", "a": "État qui s'oppose de manière constante et explicite à une norme coutumière en formation : il n'est pas lié par cette norme une fois consolidée, à condition d'avoir objecté dès le début.", "ch": "DIP"}, {"id": "builtin_fc_21", "q": "Quelle est la différence entre les principes généraux de droit (art. 38 §1 c) et les principes généraux du droit international ?", "a": "Les PGD (art. 38 §1 c) sont des principes communs aux ordres juridiques internes, transposables au plan international. Les principes généraux du DI sont des normes coutumières centrales de haut niveau (ex. souveraineté, non-ingérence).", "ch": "DIP"}, {"id": "builtin_fc_22", "q": "Qu'est-ce que la soft law et quel est son effet en DI ?", "a": "Règles non contraignantes (résolutions de l'AG, codes de conduite, déclarations politiques). Effets : elles influencent la formation de la coutume, servent de guide interprétatif, orientent la pratique étatique sans imposer d'obligations directes.", "ch": "DIP"}, {"id": "builtin_fc_23", "q": "Quelle est la différence entre monisme et dualisme dans le rapport entre DI et droit interne ?", "a": "Monisme : le DI et le droit interne forment un seul système ; le DI s'applique directement. Dualisme : ce sont des systèmes séparés ; les traités doivent être transformés en droit interne pour produire des effets devant les juridictions nationales.", "ch": "DIP"}, {"id": "builtin_fc_24", "q": "Qu'est-ce qu'une norme 'self-executing' ?", "a": "Norme internationale suffisamment précise et complète pour être appliquée directement par le juge national, sans nécessiter de législation d'exécution.", "ch": "DIP"}, {"id": "builtin_fc_25", "q": "Quelle est la position de la Suisse dans le rapport entre droit interne et droit international ?", "a": "C'est un État moniste : le DI est directement applicable. Le jus cogens prime sur la Constitution. La jurisprudence Schubert admet exceptionnellement que le législateur puisse délibérément déroger à un traité.", "ch": "DIP"}, {"id": "builtin_fc_26", "q": "Quels sont les quatre éléments constitutifs de l'État selon la Convention de Montevideo (1933) ?", "a": "1) Population permanente, 2) Territoire déterminé, 3) Gouvernement effectif, 4) Capacité d'entretenir des relations internationales (souveraineté). La reconnaissance n'est pas un élément constitutif.", "ch": "DIP"}, {"id": "builtin_fc_27", "q": "Quelle est la différence entre la théorie déclarative et la théorie constitutive de la reconnaissance étatique ?", "a": "Déclarative : l'État existe déjà dès lors qu'il remplit les critères de Montevideo ; la reconnaissance ne fait que constater ce fait. Constitutive : l'État n'existe juridiquement qu'à partir du moment où il est reconnu par d'autres États.", "ch": "DIP"}, {"id": "builtin_fc_28", "q": "Quelle est la distinction entre autodétermination interne et externe ?", "a": "Interne : droit d'un peuple à gérer ses propres affaires au sein de l'État existant (autonomie, démocratie). Externe : droit à la sécession et à l'indépendance, reconnu principalement pour les peuples coloniaux.", "ch": "DIP"}, {"id": "builtin_fc_29", "q": "Dans quelles circonstances s'applique la 'sécession-remède' ?", "a": "Dans des cas extrêmes d'oppression grave, de négation systématique des droits fondamentaux et d'exclusion totale du système politique, un peuple peut avoir un droit à la sécession comme remède de dernier recours.", "ch": "DIP"}, {"id": "builtin_fc_30", "q": "Qu'est-ce que le principe de l'uti possidetis juris ?", "a": "Principe selon lequel, au moment de l'indépendance, les frontières administratives coloniales deviennent les frontières internationales du nouvel État, afin de garantir la stabilité et de prévenir les conflits territoriaux.", "ch": "DIP"}, {"id": "builtin_fc_31", "q": "Qu'est-ce que la compétence territoriale de l'État ?", "a": "Pouvoir exclusif de l'État d'exercer sa juridiction (législative, exécutive, judiciaire) sur son territoire, y compris l'espace aérien et le sous-sol. Aucun autre État ne peut y exercer des actes de souveraineté sans son consentement.", "ch": "DIP"}, {"id": "builtin_fc_32", "q": "Quels sont les titres d'acquisition originaires du territoire en droit international ?", "a": "Occupation effective d'un territoire sans maître (terra nullius), accroissement naturel, conquête (aujourd'hui interdite). Les titres dérivés comprennent la cession, la succession et l'arbitrage.", "ch": "DIP"}, {"id": "builtin_fc_33", "q": "Que prévoit l'art. 2 §4 de la Charte de l'ONU ?", "a": "Il interdit le recours à la menace ou à l'emploi de la force contre l'intégrité territoriale ou l'indépendance politique de tout État, ou de toute autre manière incompatible avec les buts de l'ONU.", "ch": "DIP"}, {"id": "builtin_fc_34", "q": "Quelles sont les deux exceptions à l'interdiction du recours à la force dans la Charte de l'ONU ?", "a": "1) Autorisation du Conseil de sécurité au titre du Chapitre VII, 2) Légitime défense individuelle ou collective au sens de l'art. 51, jusqu'à ce que le CS prenne les mesures nécessaires.", "ch": "DIP"}, {"id": "builtin_fc_35", "q": "Qu'est-ce qu'une organisation internationale au sens juridique ?", "a": "Association d'États (principalement) constituée par un traité, dotée d'une structure institutionnelle propre et d'une personnalité juridique internationale distincte de celle des États membres.", "ch": "DIP"}, {"id": "builtin_fc_36", "q": "Qu'est-ce que le principe des pouvoirs implicites dans les OI ?", "a": "Une OI peut exercer des pouvoirs non expressément prévus dans le traité constitutif, à condition qu'ils soient nécessaires et fonctionnels à la réalisation de ses objectifs (CIJ, avis consultatif 1949 – Réparation).", "ch": "DIP"}, {"id": "builtin_fc_37", "q": "Quelle est la différence entre personnalité juridique interne et internationale d'une OI ?", "a": "Interne : capacité d'agir dans les ordres juridiques nationaux (contrats, propriété, accès aux tribunaux). Internationale : capacité d'être titulaire de droits et d'obligations en DI (conclure des traités, présenter des réclamations).", "ch": "DIP"}, {"id": "builtin_fc_38", "q": "Qu'est-ce que le fait internationalement illicite (FII) ?", "a": "Comportement imputable à un État (ou à une OI) qui constitue une violation d'une obligation internationale. Il ne requiert ni dol ni faute (responsabilité objective). Il génère l'obligation de réparation.", "ch": "DIP"}, {"id": "builtin_fc_39", "q": "Quelles sont les conditions pour imputer à l'État un comportement d'organes de facto ?", "a": "Le comportement est imputable à l'État si l'entité (ex. milice) agit sous le contrôle effectif de l'État ou si l'État adopte ultérieurement l'acte de l'entité comme sien.", "ch": "DIP"}, {"id": "builtin_fc_40", "q": "Que sont les circonstances excluant l'illicéité (CEI) ?", "a": "Situations dans lesquelles un acte par ailleurs illicite n'engage pas la responsabilité : 1) Consentement, 2) Légitime défense, 3) Contre-mesures, 4) Force majeure, 5) Détresse, 6) État de nécessité. Elles n'autorisent pas à violer le jus cogens.", "ch": "DIP"}, {"id": "builtin_fc_41", "q": "Qu'est-ce que la force majeure comme CEI ?", "a": "Force irrésistible ou événement extérieur imprévisible rendant matériellement impossible l'exécution de l'obligation. Elle ne s'applique pas si la situation est causée par l'État lui-même, ni si l'exécution est seulement plus onéreuse.", "ch": "DIP"}, {"id": "builtin_fc_42", "q": "Qu'est-ce que la détresse comme CEI ?", "a": "Situation dans laquelle un agent étatique viole le DI pour sauver sa propre vie ou celle de personnes sous sa garde, face à un danger extrême. Elle ne peut être invoquée si la situation est causée par l'État lui-même.", "ch": "DIP"}, {"id": "builtin_fc_43", "q": "Quelle est la différence entre restitution et indemnisation comme modalités de réparation ?", "a": "Restitution : modalité primaire, rétablit la situation antérieure à la violation (ex. restitution du territoire). Indemnisation : compense les dommages pécuniaires quantifiables lorsque la restitution est impossible ou insuffisante.", "ch": "DIP"}, {"id": "builtin_fc_44", "q": "Qu'est-ce que la satisfaction comme modalité de réparation ?", "a": "Modalité pour les dommages moraux ou non pécuniaires : excuses officielles, constatation de la violation par un tribunal, assurances de non-répétition. Elle ne doit pas être disproportionnée ni humiliante.", "ch": "DIP"}, {"id": "builtin_fc_45", "q": "Quelle est la différence entre contre-mesures et rétorsion ?", "a": "Contre-mesures : actes illicites mais justifiés par la réponse à un FII ; ils sont par nature pacifiques. Rétorsion : actes licites mais inamicaux (ex. rupture des relations diplomatiques), qui ne nécessitent pas de justification.", "ch": "DIP"}, {"id": "builtin_fc_46", "q": "Qu'est-ce que la protection diplomatique ?", "a": "Faculté pour un État de faire valoir au niveau international la responsabilité d'un autre État pour des dommages subis par ses ressortissants. Conditions : nationalité continue, épuisement préalable des recours internes. L'État dispose d'un pouvoir discrétionnaire.", "ch": "DIP"}, {"id": "builtin_fc_47", "q": "Que prévoit la règle de la continuité de la nationalité dans la protection diplomatique ?", "a": "La personne lésée doit avoir la nationalité de l'État protecteur au moment du FII et de manière continue jusqu'à la décision éventuelle du tribunal.", "ch": "DIP"}, {"id": "builtin_fc_48", "q": "Qu'est-ce que l'épuisement des recours internes dans la protection diplomatique ?", "a": "Le ressortissant lésé doit épuiser tous les recours internes disponibles dans l'État responsable avant que son État puisse exercer la protection diplomatique. Exceptions : recours illusoires ou inefficaces.", "ch": "DIP"}, {"id": "builtin_fc_49", "q": "Quels sont les moyens politiques de règlement pacifique des différends ?", "a": "1) Négociation directe, 2) Enquête (établissement des faits), 3) Bons offices, 4) Médiation, 5) Conciliation. Ils produisent des accords non contraignants sauf volonté contraire des parties.", "ch": "DIP"}, {"id": "builtin_fc_50", "q": "Quelle est la différence entre bons offices et médiation ?", "a": "Bons offices : le tiers facilite le contact entre les parties sans participer à la négociation. Médiation : le tiers participe activement à la négociation et propose des solutions. Les deux se combinent souvent.", "ch": "DIP"}, {"id": "builtin_fc_51", "q": "Quelle est la différence entre l'arbitrage et la procédure judiciaire (ex. CIJ) dans le règlement des différends ?", "a": "Arbitrage : agents mandataires des États, aucune institution permanente, procédure flexible, pas d'unité de jurisprudence. CIJ : tribunal permanent et institutionnalisé, jurisprudence cohérente, composition fixe.", "ch": "DIP"}, {"id": "builtin_fc_52", "q": "Qu'est-ce que le compromis arbitral ?", "a": "Accord entre les États en litige par lequel ils confèrent compétence à un tribunal arbitral pour un différend déterminé, en définissant l'objet du litige, les règles applicables et la composition du tribunal.", "ch": "DIP"}, {"id": "builtin_fc_53", "q": "Quelles sont les caractéristiques générales de la CIJ ?", "a": "Tribunal civil permanent, omnicompétent en matière de DIP, ouvert aux seuls États, compétence consensuelle (non obligatoire), organe judiciaire principal de l'ONU, Statut faisant partie intégrante de la Charte de l'ONU.", "ch": "DIP"}, {"id": "builtin_fc_54", "q": "Combien de juges composent la CIJ et comment sont-ils élus ?", "a": "15 juges élus pour 9 ans (renouvelables), élus conjointement par l'Assemblée générale et le Conseil de sécurité. Le renouvellement s'effectue par tiers tous les 3 ans. Ils représentent les principales civilisations et systèmes juridiques du monde.", "ch": "DIP"}, {"id": "builtin_fc_55", "q": "Qu'est-ce qu'un juge ad hoc à la CIJ ?", "a": "Juge désigné par un État partie à une affaire contentieuse lorsqu'aucun juge ordinaire n'a sa nationalité, afin de garantir l'égalité de traitement et la confiance des parties. Maximum 2 par affaire.", "ch": "DIP"}, {"id": "builtin_fc_56", "q": "Quelle est la différence entre compétence et recevabilité devant la CIJ ?", "a": "Compétence : porte sur les conditions propres à l'organe (personae, materiae, consensus). Recevabilité : porte sur la régularité de la demande (est-elle correctement formulée ? dans les délais ? par le sujet habilité ?). Ce sont deux questions distinctes.", "ch": "DIP"}, {"id": "builtin_fc_57", "q": "Qu'est-ce que la compétence de la compétence à la CIJ ?", "a": "Principe selon lequel la Cour décide elle-même si elle est compétente en cas de contestation. La décision sur la compétence est contraignante pour les parties, même si la Cour se déclare incompétente au fond.", "ch": "DIP"}, {"id": "builtin_fc_58", "q": "Qu'est-ce que le forum prorogatum devant la CIJ ?", "a": "Forme de consentement implicite à la compétence de la CIJ : si un État ne soulève pas d'exception d'incompétence alors qu'il pourrait le faire, son silence vaut acceptation ad hoc de la juridiction.", "ch": "DIP"}, {"id": "builtin_fc_59", "q": "Qu'est-ce qu'une clause compromissoire dans un traité ?", "a": "Clause insérée dans un traité dont l'objet principal n'est pas le règlement des différends, qui confère compétence à la CIJ pour les contestations relatives à l'interprétation ou à l'application de ce traité spécifique.", "ch": "DIP"}, {"id": "builtin_fc_60", "q": "Qu'est-ce que le principe de l'or monétaire (CIJ, 1954) ?", "a": "La Cour n'exerce pas sa compétence lorsque, pour ce faire, elle devrait se prononcer sur les droits subjectifs d'un État tiers n'ayant pas consenti à sa juridiction. Il s'agit d'une exception d'irrecevabilité, non d'incompétence.", "ch": "DIP"}, {"id": "builtin_fc_61", "q": "Quelles mesures conservatoires la CIJ peut-elle adopter ?", "a": "La CIJ peut indiquer des mesures provisoires pour préserver les droits des parties dans l'attente de l'arrêt définitif, s'il existe un risque de préjudice irréparable. Ces mesures conservatoires sont contraignantes pour les parties.", "ch": "DIP"}, {"id": "builtin_fc_62", "q": "Qui peut demander un avis consultatif à la CIJ ?", "a": "L'Assemblée générale et le Conseil de sécurité de l'ONU (sur toute question juridique), d'autres organes et institutions spécialisées autorisés par l'AG (uniquement dans les matières relevant de leur compétence). Les États ne peuvent pas le faire directement.", "ch": "DIP"}, {"id": "builtin_fc_63", "q": "Les avis consultatifs de la CIJ sont-ils contraignants ?", "a": "En principe non. Ils peuvent toutefois devenir contraignants si les parties l'acceptent préalablement (accord spécifique). La Cour peut discrétionnairement refuser de s'exprimer, mais en pratique elle ne le fait presque jamais.", "ch": "DIP"}, {"id": "builtin_fc_64", "q": "Comment la procédure consultative se distingue-t-elle de la procédure contentieuse devant la CIJ ?", "a": "Consultative : aucun juge ad hoc ; la Cour conduit l'instruction de sa propre initiative ; pas de parties formelles ; pas de charge de la preuve. Contentieuse : parties formelles, juges ad hoc, arrêt contraignant.", "ch": "DIP"}, {"id": "builtin_fc_65", "q": "Comment les arrêts de la CIJ sont-ils exécutés ?", "a": "Les arrêts sont contraignants pour les parties (art. 94 de la Charte de l'ONU). En cas d'inexécution, l'État lésé peut saisir le Conseil de sécurité, qui peut prendre des mesures contraignantes pour en assurer l'exécution.", "ch": "DIP"}, {"id": "builtin_fc_66", "q": "Qu'est-ce que le Conseil des droits de l'homme de l'ONU ?", "a": "Organe subsidiaire de l'AG composé de 47 États, créé en 2006 pour remplacer la Commission des droits de l'homme. Il gère l'EPU, commande des rapports d'experts et traite des violations graves dans le cadre de la procédure 1503.", "ch": "DIP"}, {"id": "builtin_fc_67", "q": "Qu'est-ce que l'Examen périodique universel (EPU) ?", "a": "Mécanisme de contrôle universel du Conseil des DdH : tous les 4 ans, tous les États membres de l'ONU sont soumis à un examen de leur bilan en matière de droits de l'homme. C'est un processus diplomatique, non juridiquement contraignant.", "ch": "DIP"}, {"id": "builtin_fc_68", "q": "Quelle est la différence entre le système universel et les systèmes régionaux de protection des droits de l'homme ?", "a": "Universel (ONU) : essentiellement diplomatique, recommandations non contraignantes. Régional (ex. CEDH en Europe) : peut prévoir une juridiction avancée avec des arrêts contraignants rendus par une cour permanente.", "ch": "DIP"}, {"id": "builtin_fc_69", "q": "Quelles sont les trois générations des droits de l'homme ?", "a": "1re : Droits civils et politiques (libertés individuelles). 2e : Droits économiques, sociaux et culturels (émergent au XXe s.). 3e : Droits collectifs (droit à la paix, à un environnement sain).", "ch": "DIP"}, {"id": "builtin_fc_70", "q": "Quelle est la différence entre obligations positives et obligations négatives en matière de droits de l'homme ?", "a": "Obligations négatives : l'État s'abstient d'ingérences (ex. ne pas torturer). Obligations positives : l'État agit activement pour protéger les droits (ex. former le personnel, enquêter sur les violations, protéger contre les violations privées).", "ch": "DIP"}, {"id": "builtin_fc_71", "q": "Qu'est-ce que la dérogation (suspension) aux droits de l'homme ?", "a": "Possibilité pour un État de suspendre temporairement certains droits de l'homme en situation d'urgence (conflit armé, crise grave). Non applicable aux droits absolus comme l'interdiction de la torture.", "ch": "DIP"}, {"id": "builtin_fc_72", "q": "Qu'est-ce que le principe d'extra-territorialité dans la garantie des droits de l'homme ?", "a": "Un État peut être tenu responsable de violations des droits de l'homme en dehors de son territoire s'il y exerce un contrôle effectif (ex. occupation militaire) ou sur des personnes à l'étranger (ex. détenus dans des prisons étrangères).", "ch": "DIP"}, {"id": "builtin_fc_73", "q": "Quels sont les quatre éléments cumulatifs de la définition de la torture selon la CCT ?", "a": "1) Douleur ou souffrance aiguë physique ou mentale, 2) Infligée intentionnellement, 3) Poursuivant un but spécifique (informations, aveux, punition, coercition), 4) Par un agent de l'État ou avec son consentement exprès/tacite.", "ch": "DIP"}, {"id": "builtin_fc_74", "q": "Quelle est la différence entre torture, traitement inhumain et traitement dégradant (CEDH) ?", "a": "Torture : souffrance aiguë + agent étatique + intention + but. Traitement inhumain : souffrance intense causée par un agent étatique, sans exigence de but ni d'intention. Traitement dégradant : humiliation, peur, sentiment d'infériorité.", "ch": "DIP"}, {"id": "builtin_fc_75", "q": "Qu'est-ce que l'obligation de non-refoulement en matière de torture ?", "a": "Interdiction faite à un État de renvoyer (expulser, extrader) une personne vers un pays où il existe un risque crédible qu'elle soit soumise à la torture. Cette obligation est absolue et indérogeable.", "ch": "DIP"}, {"id": "builtin_fc_76", "q": "Qu'est-ce que la compétence pénale universelle ?", "a": "Faculté pour un État de poursuivre pénalement les auteurs de certains crimes internationaux graves (ex. torture, génocide) indépendamment de la nationalité de l'auteur ou de la victime et du lieu de commission du crime.", "ch": "DIP"}, {"id": "builtin_fc_77", "q": "Qu'est-ce que le Tribunal militaire international de Nuremberg (1945) ?", "a": "Premier tribunal pénal international, institué par les principaux Alliés après la Seconde Guerre mondiale. Compétence : crimes d'agression, crimes de guerre, crimes contre l'humanité. Le génocide n'était pas encore codifié.", "ch": "DIP"}, {"id": "builtin_fc_78", "q": "Quelle est la différence entre les tribunaux pénaux ad hoc et la CPI ?", "a": "Tribunaux ad hoc (TPIY, TPIR) : créés par le CS pour des situations spécifiques, compétence prioritaire par rapport aux États, coûteux et éloignés. CPI : permanente, fondée sur le Statut de Rome, compétence complémentaire.", "ch": "DIP"}, {"id": "builtin_fc_79", "q": "Quelles sont les quatre catégories de crimes relevant de la compétence de la CPI ?", "a": "1) Génocide, 2) Crimes contre l'humanité, 3) Crimes de guerre, 4) Crime d'agression (compétence partielle, soumise à des conditions spécifiques).", "ch": "DIP"}, {"id": "builtin_fc_80", "q": "Qu'est-ce que le principe de complémentarité de la CPI ?", "a": "La CPI n'a pas de compétence prioritaire : il incombe aux États de poursuivre les responsables. La CPI n'intervient que si l'État est 'unwilling' (ne veut pas) ou 'unable' (ne peut pas) procéder efficacement.", "ch": "DIP"}, {"id": "builtin_fc_81", "q": "Qui peut déférer une situation à la CPI ?", "a": "1) Un État partie (une situation, non un crime spécifique), 2) Le Conseil de sécurité de l'ONU (y compris pour des situations d'États non parties), 3) Le Procureur de sa propre initiative (avec validation de la Chambre préliminaire).", "ch": "DIP"}, {"id": "builtin_fc_82", "q": "Qu'est-ce que le principe de non-rétroactivité à la CPI ?", "a": "La CPI n'est pas compétente pour des crimes commis avant le 1er juillet 2002 (entrée en vigueur du Statut de Rome). Les États qui adhèrent ultérieurement ne peuvent être poursuivis pour des faits antérieurs à leur adhésion, sauf déclaration ad hoc.", "ch": "DIP"}, {"id": "builtin_fc_83", "q": "Comment fonctionne la compétence territoriale et personnelle active de la CPI ?", "a": "Territoriale : crimes commis sur le territoire d'un État partie, même si l'auteur est ressortissant d'un État non partie. Personnelle active : crimes commis par des ressortissants d'un État partie, même sur le territoire d'un État non partie.", "ch": "DIP"}, {"id": "builtin_fc_84", "q": "Quel est le mécanisme d'« obstacle politique au procès » à la CPI ?", "a": "Le CS peut demander à la CPI de suspendre une enquête ou une procédure pour 12 mois renouvelables (art. 16 du Statut de Rome). Cela crée un équilibre entre justice et paix/sécurité internationale.", "ch": "DIP"}, {"id": "builtin_fc_85", "q": "Quels sont les quatre groupes protégés par la définition du génocide ?", "a": "1) Groupes nationaux (nationalité commune), 2) Groupes ethniques (langue/culture), 3) Groupes raciaux (caractéristiques physiques héréditaires), 4) Groupes religieux (croyance/idéal spirituel). La liste est limitative en droit international.", "ch": "DIP"}, {"id": "builtin_fc_86", "q": "Quels sont les actes prohibés constitutifs du génocide ?", "a": "a) Meurtre de membres du groupe, b) Atteinte grave à l'intégrité physique ou mentale, c) Soumission intentionnelle à des conditions d'existence entraînant la destruction, d) Mesures visant à entraver les naissances, e) Transfert forcé d'enfants vers un autre groupe.", "ch": "DIP"}, {"id": "builtin_fc_87", "q": "Qu'est-ce que le dol spécial (dolus specialis) dans le crime de génocide ?", "a": "Double élément subjectif : 1) Intention et connaissance de l'acte prohibé, 2) Intention spéciale de détruire en tout ou en partie le groupe protégé. Le mobile n'est pas juridiquement pertinent.", "ch": "DIP"}, {"id": "builtin_fc_88", "q": "Qu'est-ce que la 'fraction substantielle' dans le contexte du génocide ?", "a": "Le génocide ne requiert pas la destruction de l'ensemble du groupe : il suffit de l'intention de détruire une fraction substantielle (ex. les élites du groupe, ou un nombre tel que sa survie serait compromise).", "ch": "DIP"}, {"id": "builtin_fc_89", "q": "Pourquoi le 'nettoyage ethnique' seul ne constitue-t-il pas un génocide ?", "a": "Le nettoyage ethnique vise à déplacer une population, non à la détruire. Le dol spécial de destruction du groupe fait défaut. Il peut néanmoins constituer un crime contre l'humanité ou un crime de guerre.", "ch": "DIP"}, {"id": "builtin_fc_90", "q": "Qu'est-ce qu'un crime contre l'humanité et comment se distingue-t-il du génocide ?", "a": "Actes systématiques ou généralisés commis contre une population civile selon un plan politique (sans ciblage d'un groupe spécifique). À la différence du génocide, il ne requiert pas le dol spécial de destruction d'un groupe protégé. C'est le 'crime subsidiaire' du génocide.", "ch": "DIP"}, {"id": "builtin_fc_91", "q": "Qu'est-ce que la distinction entre CAI et CANI en matière de crimes de guerre ?", "a": "CAI (Conflit armé international) : entre États ; les infractions graves des Conventions de Genève et d'autres violations graves s'appliquent. CANI (Conflit armé non international) : entre une entité étatique et un groupe armé ; l'art. 3 commun et d'autres violations graves s'appliquent.", "ch": "DIP"}, {"id": "builtin_fc_92", "q": "Qu'est-ce que l'obligation erga omnes et comment se distingue-t-elle de l'obligation erga omnes partes ?", "a": "Erga omnes : obligation coutumière due à tous les États (ex. interdiction du génocide). Erga omnes partes : obligation due à tous les États parties à un traité spécifique (ex. Convention contre la torture). Les deux légitiment les États tiers à invoquer la responsabilité.", "ch": "DIP"}, {"id": "builtin_fc_93", "q": "Que peuvent faire les États non lésés (États tiers) en cas de violation d'obligations erga omnes ?", "a": "Ils peuvent exiger la cessation du FII et la réparation en faveur des États lésés. La possibilité de prendre des contre-mesures collectives est controversée en doctrine mais fréquente en pratique (ex. sanctions collectives).", "ch": "DIP"}, {"id": "builtin_fc_94", "q": "Qu'est-ce que la cessation comme conséquence du FII ?", "a": "Conséquence spéciale pour les violations continues : l'État doit cesser le comportement illicite. Elle opère automatiquement, sans qu'une demande de l'État lésé soit nécessaire, à condition que l'obligation soit encore en vigueur.", "ch": "DIP"}, {"id": "builtin_fc_95", "q": "Qu'est-ce que la garantie de non-répétition comme conséquence du FII ?", "a": "L'État lésé peut demander à l'État violateur des garanties que le fait ne se reproduira pas (assurances verbales ou écrites, mesures concrètes comme des instructions aux fonctionnaires). Elle vise à rétablir la confiance entre les États.", "ch": "DIP"}, {"id": "builtin_fc_96", "q": "Qu'est-ce que la solidarité juridique dans l'indemnisation ?", "a": "Lorsque plusieurs États sont responsables d'un FII, l'État lésé peut choisir d'en poursuivre un seul pour la totalité du dommage. Cet État peut ensuite se retourner contre les autres co-responsables pour leur part respective.", "ch": "DIP"}, {"id": "builtin_fc_97", "q": "Qu'est-ce que le dommage médiat par opposition au dommage immédiat dans la protection diplomatique ?", "a": "Dommage immédiat : préjudice direct subi par l'État lui-même → aucun épuisement préalable des recours internes requis. Dommage médiat : préjudice subi par le ressortissant, que l'État 'reprend à son compte' → épuisement des recours internes requis.", "ch": "DIP"}, {"id": "builtin_fc_98", "q": "Pourquoi les immunités personnelles (troïka) peuvent-elles faire obstacle aux procédures pénales internationales ?", "a": "Les chefs d'État, chefs de gouvernement et ministres des affaires étrangères (troïka) bénéficient d'une immunité personnelle absolue devant les tribunaux étrangers pendant toute la durée de leurs fonctions. À la CPI, en revanche, les immunités ne font pas obstacle.", "ch": "DIP"}, {"id": "builtin_fc_99", "q": "Qu'est-ce que l'incitation directe et publique à commettre le génocide ?", "a": "Crime autonome : quiconque incite publiquement et directement à commettre un génocide est punissable même si le génocide n'est pas ensuite commis. C'est une mesure préventive qui anticipe la punissabilité.", "ch": "DIP"}, {"id": "builtin_fc_100", "q": "Quelles affirmations résument les points clés sur la hiérarchie entre DI et droit interne devant les juges internationaux ?", "a": "Sur le plan international, le DI prime toujours sur le droit interne : un État ne peut invoquer son droit interne pour justifier une violation (art. 27 CVDT). Sur le plan interne, la solution varie selon l'ordre juridique (monisme/dualisme, rang constitutionnel des traités).", "ch": "DIP"}];
const BUILTIN_QCM = [{"id": "builtin_qcm_1", "q": "Quelles affirmations décrivent correctement la nature du droit international public (DIP) ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. C’est un droit de coordination entre États, sans autorité supérieure ni police centrale", "isCorrect": true}, {"text": "B. C’est un droit exclusivement dépourvu de sanctions, donc uniquement politique et non juridique", "isCorrect": false}, {"text": "C. Il ne règle que les relations entre États, sans exceptions", "isCorrect": false}, {"text": "D. Il comprend des normes structurantes (sources, sujets, responsabilité, règlement des différends)", "isCorrect": true}, {"text": "E. C’est un droit dans lequel la guerre est encore un moyen ordinaire et non réglementé de régler les conflits", "isCorrect": false}], "explanation": "Le DIP est un droit de coordination qui règle principalement, mais non exclusivement, les relations entre États, sans autorité centrale ; il contient des normes structurantes comme les sources, les rapports avec le droit interne, les sujets, la responsabilité et le règlement des différends."}, {"id": "builtin_qcm_2", "q": "Quels éléments caractérisent le passage du droit international classique au droit international moderne ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Augmentation du nombre de normes et de sujets (y compris individus et organisations)", "isCorrect": true}, {"text": "B. Passage d’un droit principalement de coexistence à un droit aussi de coopération", "isCorrect": true}, {"text": "C. Disparition des organisations internationales, pour revenir à des relations purement interétatiques", "isCorrect": false}, {"text": "D. Plus grande organicité, avec des structures institutionnelles globales et régionales", "isCorrect": true}, {"text": "E. Retour à la licéité du colonialisme comme institution centrale", "isCorrect": false}], "explanation": "Le DI moderne se caractérise par une explosion des normes, l’émergence de nouveaux sujets, l’accent sur la coopération au-delà de la simple coexistence et une forte organicité via des organisations internationales."}, {"id": "builtin_qcm_3", "q": "Selon l’art. 38 §1 du Statut de la CIJ, quelles sont les principales sources formelles du droit international ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Les traités internationaux", "isCorrect": true}, {"text": "B. Le droit interne des États", "isCorrect": false}, {"text": "C. La coutume internationale", "isCorrect": true}, {"text": "D. Les principes généraux de droit reconnus par les nations civilisées", "isCorrect": true}, {"text": "E. La jurisprudence internationale comme source obligatoire", "isCorrect": false}], "explanation": "L’art. 38 §1 mentionne comme sources principales les traités, la coutume et les principes généraux ; la jurisprudence et la doctrine ne sont que des moyens auxiliaires, et le droit interne n’est pas une source formelle internationale."}, {"id": "builtin_qcm_4", "q": "En cas de conflit entre normes de droit international (traités et coutume), quelles techniques interprétatives ou quels principes sont correctement utilisés ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Lex posterior derogat legi priori", "isCorrect": true}, {"text": "B. Lex specialis derogat legi generali", "isCorrect": true}, {"text": "C. La règle absolue selon laquelle la coutume est toujours supérieure aux traités", "isCorrect": false}, {"text": "D. Application de l’art. 103 de la Charte de l’ONU en cas de conflit avec d’autres accords", "isCorrect": true}, {"text": "E. Le principe selon lequel les accords régionaux priment toujours sur les traités universels", "isCorrect": false}], "explanation": "Il n’existe pas de hiérarchie générale entre traités et coutume ; on utilise lex posterior, lex specialis et, en présence d’obligations de la Charte de l’ONU, l’art. 103 fait prévaloir ces dernières."}, {"id": "builtin_qcm_5", "q": "Quelles affirmations concernant la notion de jus cogens sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Ce sont des normes générales de droit international qui ne peuvent pas être écartées par des traités", "isCorrect": true}, {"text": "B. Un traité contraire au jus cogens est nul ab initio (nullité absolue)", "isCorrect": true}, {"text": "C. Les États peuvent déroger au jus cogens si tous sont d’accord", "isCorrect": false}, {"text": "D. Une nouvelle norme de jus cogens peut éteindre un traité auparavant conforme au droit", "isCorrect": true}, {"text": "E. Le jus cogens ne concerne que le ius in bello et jamais d’autres matières", "isCorrect": false}], "explanation": "Les normes de jus cogens sont inderogeables ; un traité contraire est nul, et une norme impérative ultérieure éteint les traités incompatibles (art. 64 CVDT)."}, {"id": "builtin_qcm_6", "q": "Quels éléments sont cumulatifs dans la définition coutumière du ‘traité’ (accord international) selon le droit international général ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Accord de volontés concordantes entre sujets de droit international", "isCorrect": true}, {"text": "B. Conclu par écrit", "isCorrect": false}, {"text": "C. Destiné à produire des effets juridiques (droits et obligations)", "isCorrect": true}, {"text": "D. Régi par le droit international", "isCorrect": true}, {"text": "E. Signé et ratifié par tous les États membres de l’ONU", "isCorrect": false}], "explanation": "La définition coutumière est plus large que celle de la CVDT : volontés concordantes entre sujets de DI, avec des effets juridiques, régies par le DI ; la forme écrite est exigée par la CVDT, pas par la définition générale."}, {"id": "builtin_qcm_7", "q": "Selon la CVDT de 1969, quelles sont les phases typiques de la conclusion d’un traité multilatéral ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Négociation entre plénipotentiaires ou organes compétents", "isCorrect": true}, {"text": "B. Adoption du texte et authentification (par exemple paraphe ou équivalent)", "isCorrect": true}, {"text": "C. Signature qui clôt la négociation mais ne lie pas nécessairement définitivement l’État", "isCorrect": true}, {"text": "D. Ratification ou adhésion comme expression du consentement définitif à être lié", "isCorrect": true}, {"text": "E. Enregistrement auprès du Conseil de sécurité comme condition de validité du traité", "isCorrect": false}], "explanation": "Négociation, adoption du texte, signature, ratification/adhésion et entrée en vigueur sont les phases classiques ; l’enregistrement auprès de l’ONU influe sur l’invocabilité, non sur la validité."}, {"id": "builtin_qcm_8", "q": "Quelles affirmations sur la signature d’un traité sont correctes selon la CVDT et le cours ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La signature empêche toute modification ultérieure du texte sauf accord de toutes les parties", "isCorrect": true}, {"text": "B. La signature fait automatiquement entrer le traité en vigueur pour l’État signataire", "isCorrect": false}, {"text": "C. La signature clôt la négociation, mais l’obligation d’exécution naît seulement avec la ratification sauf disposition contraire", "isCorrect": true}, {"text": "D. L’État signataire a le devoir de ne pas priver le traité de son objet et de son but en attendant de décider s’il ratifie", "isCorrect": true}, {"text": "E. La signature d’un traité équivaut toujours à la ratification en droit international", "isCorrect": false}], "explanation": "La signature clôt la négociation, cristallise le texte et crée l’obligation négative de ne pas en frustrer l’objet et le but ; en général l’obligation pleine naît avec la ratification/adhésion, sauf forme simplifiée."}, {"id": "builtin_qcm_9", "q": "Quelles affirmations sur les réserves aux traités multilatéraux sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Ce sont des déclarations unilatérales par lesquelles un État exclut ou modifie l’effet juridique de certaines dispositions à son égard", "isCorrect": true}, {"text": "B. Elles ne sont jamais admises dans les traités multilatéraux, mais seulement dans les bilatéraux", "isCorrect": false}, {"text": "C. Elles doivent être formulées au moment de la signature, de la ratification ou de l’adhésion", "isCorrect": true}, {"text": "D. Elles ne peuvent pas être incompatibles avec l’objet et le but du traité", "isCorrect": true}, {"text": "E. Elles peuvent être retirées, mais pas modifiées, une fois formulées", "isCorrect": false}], "explanation": "La réserve est une déclaration unilatérale au moment de la signature/ratification/adhésion, admise sauf interdiction du traité ou incompatibilité avec l’objet et le but ; il n’y a pas de réserves dans les traités bilatéraux."}, {"id": "builtin_qcm_10", "q": "Concernant les effets des réserves, quelles propositions sont correctes selon la CVDT et le cours ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le silence d’un État partie pendant 12 mois après la notification vaut acceptation de la réserve", "isCorrect": true}, {"text": "B. Une objection simple exclut l’application de la disposition visée par la réserve dans les relations bilatérales entre l’État réservant et l’État objectant", "isCorrect": true}, {"text": "C. Une objection radicale peut empêcher l’entrée en vigueur du traité entre l’État réservant et l’État objectant", "isCorrect": true}, {"text": "D. Les réserves fragmentent un traité multilatéral en une constellation de relations bilatérales différenciées", "isCorrect": true}, {"text": "E. L’effet de la réserve est identique à l’égard de tous les États parties, indépendamment de leurs réactions", "isCorrect": false}], "explanation": "Les réserves produisent des effets bilatéraux différents selon l’acceptation, le silence ou l’objection (simple ou radicale), et fragmentent l’uniformité du traité."}, {"id": "builtin_qcm_11", "q": "Quels sont des motifs de nullité d’un traité prévus par le droit des traités, selon ton résumé ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Erreur fondamentale sur l’objet du traité", "isCorrect": true}, {"text": "B. Dol et corruption du représentant de l’État", "isCorrect": true}, {"text": "C. Violation manifeste d’une norme fondamentale de droit interne relative à la compétence pour conclure des traités", "isCorrect": true}, {"text": "D. Contrainte de l’État par la menace ou l’emploi de la force", "isCorrect": true}, {"text": "E. Simple changement de gouvernement après la signature du traité", "isCorrect": false}], "explanation": "Erreur fondamentale, dol, corruption, violation manifeste des normes fondamentales internes sur la compétence et contrainte de l’État sont des motifs de nullité ; le changement de gouvernement ne l’est pas."}, {"id": "builtin_qcm_12", "q": "Quelle est la différence principale entre nullité relative et nullité absolue d’un traité ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La nullité relative ne produit des effets qu’ex nunc, la nullité absolue ex tunc", "isCorrect": false}, {"text": "B. La nullité relative doit être invoquée par l’État intéressé, la nullité absolue opère automatiquement", "isCorrect": true}, {"text": "C. La nullité absolue concerne des intérêts collectifs (par ex. jus cogens, contrainte), la relative des intérêts plus ‘privés’ de l’État", "isCorrect": true}, {"text": "D. La nullité relative n’est pas prévue par la CVDT", "isCorrect": false}, {"text": "E. La nullité absolue ne concerne que les erreurs matérielles de rédaction", "isCorrect": false}], "explanation": "La nullité relative doit être invoquée par l’État concerné et touche ses intérêts propres ; la nullité absolue (contrainte, jus cogens) opère de droit et protège des intérêts collectifs."}, {"id": "builtin_qcm_13", "q": "Concernant l’effet relatif des traités à l’égard des États tiers, quelles propositions sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Les traités ne peuvent en principe pas créer d’obligations pour des États tiers sans leur consentement", "isCorrect": true}, {"text": "B. Un traité peut conférer des droits à des États tiers, qui sont présumés acceptés sauf refus", "isCorrect": true}, {"text": "C. Un accord collatéral permet d’imposer des obligations à un État tiers seulement s’il les accepte expressément par écrit", "isCorrect": true}, {"text": "D. Les conséquences politiques de fait sur les États tiers équivalent à des obligations juridiques pour eux", "isCorrect": false}, {"text": "E. Les droits conférés aux États tiers sont toujours irrévocables", "isCorrect": false}], "explanation": "Il existe un effet relatif : pas d’obligations sans consentement ; des droits peuvent être conférés avec acceptation présumée ou expresse ; les conséquences de fait ne créent pas d’obligations juridiques."}, {"id": "builtin_qcm_14", "q": "Selon la CVDT et le cours, quels sont les éléments centraux de la règle générale d’interprétation des traités ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le sens ordinaire des termes de bonne foi", "isCorrect": true}, {"text": "B. Le contexte du texte (préambule, annexes, autres articles)", "isCorrect": true}, {"text": "C. L’objet et le but du traité", "isCorrect": true}, {"text": "D. La volonté subjective non publiée des parties, même si elle n’apparaît pas dans le texte", "isCorrect": false}, {"text": "E. Les travaux préparatoires comme moyen complémentaire", "isCorrect": true}], "explanation": "Interprétation : sens ordinaire, contexte, objet et but et, à titre complémentaire, travaux préparatoires ; l’approche de la CVDT est objectiviste, non purement subjective."}, {"id": "builtin_qcm_15", "q": "Quelles techniques argumentatives d’interprétation sont correctement décrites dans ton résumé ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Argument a contrario : si un cas n’est pas mentionné alors que d’autres le sont, on présume qu’il est exclu", "isCorrect": true}, {"text": "B. Argument par analogie : on étend la règle à des cas similaires sur la base de la ratio", "isCorrect": true}, {"text": "C. Argument a fortiori : si un comportement moins grave est interdit, un plus grave l’est a fortiori", "isCorrect": true}, {"text": "D. Effet utile : entre deux interprétations, on privilégie celle qui donne un sens et un effet aux termes", "isCorrect": true}, {"text": "E. Eiusdem generis : des clauses du type ‘autres actes analogues’ se limitent aux cas du même genre", "isCorrect": true}], "explanation": "Toutes ces techniques sont mentionnées : a contrario, par analogie, a fortiori, effet utile et eiusdem generis, toujours à la lumière de l’objet et du but."}, {"id": "builtin_qcm_16", "q": "Quelles affirmations correctes concernent la mise en œuvre des traités dans les États ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Pacta sunt servanda implique que les États sont tenus d’exécuter de bonne foi les traités en vigueur pour eux", "isCorrect": true}, {"text": "B. Un État peut invoquer son droit interne pour justifier la non-exécution d’un traité", "isCorrect": false}, {"text": "C. L’art. 27 CVDT interdit d’invoquer le droit interne comme justification du non-respect", "isCorrect": true}, {"text": "D. L’application territoriale d’un traité est présumée s’étendre à l’ensemble du territoire de l’État partie", "isCorrect": true}, {"text": "E. Les traités s’appliquent automatiquement aussi aux États non parties, par effet erga omnes", "isCorrect": false}], "explanation": "Pacta sunt servanda et l’art. 27 CVDT imposent l’exécution indépendamment du droit interne ; il existe une présomption d’application à l’ensemble du territoire et pas d’effet erga omnes automatique."}, {"id": "builtin_qcm_17", "q": "Quels sont des motifs subjectifs typiques d’extinction d’un traité selon la CVDT ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Contrarius actus, c’est-à-dire accord de toutes les parties pour mettre fin au traité", "isCorrect": true}, {"text": "B. Conclusion d’un traité postérieur sur le même objet qui abroge le précédent", "isCorrect": true}, {"text": "C. Clauses résolutoires ou de quorum prévues par le traité", "isCorrect": true}, {"text": "D. Dénonciation unilatérale lorsque le traité l’admet ou que cela découle de sa nature", "isCorrect": true}, {"text": "E. Simple changement de gouvernement, sans autres conditions", "isCorrect": false}], "explanation": "Accord des parties, traité postérieur, clauses résolutoires et droit de dénonciation (lorsqu’il est prévu ou implicite) sont des motifs subjectifs d’extinction ; le changement de gouvernement ne l’est pas."}, {"id": "builtin_qcm_18", "q": "Concernant la succession de traités et le principe ‘rebus sic stantibus’ (changement fondamental de circonstances), quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le changement fondamental de circonstances est un motif exceptionnel d’extinction, pas en principe de nullité", "isCorrect": true}, {"text": "B. Il exige notamment que les circonstances aient constitué une base essentielle du consentement des parties", "isCorrect": true}, {"text": "C. Il ne peut pas être invoqué pour des traités de frontière", "isCorrect": true}, {"text": "D. Il permet aux États de renégocier le traité ; la terminaison unilatérale n’est possible que si les critères cumulatifs sont remplis", "isCorrect": true}, {"text": "E. Il peut être librement invoqué chaque fois que le contexte politique change", "isCorrect": false}], "explanation": "Rebus sic stantibus est exceptionnel, avec des conditions cumulatives (base essentielle, changement radical, imprévu, etc.) et ne s’applique pas aux traités de frontière."}, {"id": "builtin_qcm_19", "q": "Quels éléments définissent la coutume internationale selon ton cours ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Une pratique des États suffisamment générale, uniforme et constante", "isCorrect": true}, {"text": "B. La simple répétition de comportements, indépendamment de la motivation", "isCorrect": false}, {"text": "C. L’opinio juris, c’est-à-dire la conviction que la pratique est juridiquement obligatoire ou doit le devenir", "isCorrect": true}, {"text": "D. La production exclusive et automatique de normes impératives (jus cogens)", "isCorrect": false}, {"text": "E. La possibilité de formation de coutumes régionales, bilatérales ou trilatérales", "isCorrect": true}], "explanation": "La coutume requiert une pratique qualifiée et l’opinio juris ; toutes les coutumes ne sont pas de jus cogens et il peut exister des coutumes particulières (régionales, bilatérales, etc.)."}, {"id": "builtin_qcm_20", "q": "Quelles affirmations sur la pratique et l’opinio juris sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La pratique peut consister en actes positifs, omissions et déclarations", "isCorrect": true}, {"text": "B. Les actes de pure ‘courtoisie’ ne contribuent pas à la formation de normes coutumières", "isCorrect": true}, {"text": "C. L’opinio juris sert à distinguer la pratique juridique de comportements dictés par la courtoisie ou l’opportunité politique", "isCorrect": true}, {"text": "D. Pour former une coutume, le consentement exprès de tous les États du monde est nécessaire", "isCorrect": false}, {"text": "E. Les États nouveaux naissent dans un ordre coutumier déjà existant qu’ils doivent respecter", "isCorrect": true}], "explanation": "La coutume naît de la pratique et de l’opinio juris ; la courtoisie et les actes non juridiques sont exclus ; l’unanimité n’est pas requise et les États nouveaux entrent dans un ordre déjà constitué."}, {"id": "builtin_qcm_21", "q": "Quelles affirmations sur les principes généraux de droit (art. 38 §1 c) sont correctes selon le cours ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Ce sont des principes communs aux principaux ordres juridiques internes, transposables au plan international", "isCorrect": true}, {"text": "B. Ils servent à combler les lacunes lorsqu’il n’y a ni traité ni coutume", "isCorrect": true}, {"text": "C. Ils comprennent des principes matériels (par ex. bonne foi) et procéduraux", "isCorrect": true}, {"text": "D. Ils sont identiques aux principes généraux du droit international (normes coutumières de haut niveau)", "isCorrect": false}, {"text": "E. Ils ne s’appliquent jamais par analogie à partir du droit interne", "isCorrect": false}], "explanation": "Les PGD sont extraits des ordres juridiques internes pour combler les lacunes du DI ; ils se distinguent des ‘principes généraux du DI’, qui sont des normes coutumières centrales."}, {"id": "builtin_qcm_22", "q": "Quelles affirmations sur la soft law en droit international public sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elle consiste en des règles de conduite dépourvues de valeur juridiquement contraignante", "isCorrect": true}, {"text": "B. Elle peut provenir de résolutions d’OI, d’accords politiques, de rapports d’experts", "isCorrect": true}, {"text": "C. Elle ne produit aucun effet juridique, même indirect", "isCorrect": false}, {"text": "D. Elle peut influencer le développement du droit coutumier et l’interprétation des traités", "isCorrect": true}, {"text": "E. Elle est privilégiée par les États lorsqu’ils craignent des contraintes juridiques trop rigides", "isCorrect": true}], "explanation": "La soft law n’est pas formellement contraignante, mais peut avoir des effets législatifs, interprétatifs et politiques ; les États l’utilisent souvent pour éviter des contraintes rigides tout en orientant la pratique."}, {"id": "builtin_qcm_23", "q": "Dans le rapport entre droit international et droit interne, quelles affirmations décrivent correctement dualisme et monisme ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. En système dualiste, les traités doivent être transformés en droit interne pour produire des effets devant les juridictions nationales", "isCorrect": true}, {"text": "B. En système moniste, le droit international est incorporé automatiquement dans l’ordre interne", "isCorrect": true}, {"text": "C. La Suisse est un exemple typique d’État moniste", "isCorrect": true}, {"text": "D. En système dualiste, la coutume nécessite toujours une transformation", "isCorrect": false}, {"text": "E. En système moniste, il n’existe jamais de conflit entre droit international et droit interne", "isCorrect": false}], "explanation": "Les États dualistes exigent une transformation des traités ; les monistes les incorporent ; la Suisse est moniste ; la coutume entre souvent sans transformation même dans les systèmes dualistes ; des conflits peuvent néanmoins exister."}, {"id": "builtin_qcm_24", "q": "Concernant le rang du droit international dans l’ordre juridique suisse, quelles propositions sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. En principe, le droit international prime sur le droit interne (primauté du DI)", "isCorrect": true}, {"text": "B. Les normes de jus cogens priment même sur la Constitution fédérale", "isCorrect": true}, {"text": "C. La jurisprudence Schubert admet à titre exceptionnel que le législateur fédéral puisse s’écarter délibérément d’un traité", "isCorrect": true}, {"text": "D. Le Tribunal fédéral cherche avant tout une interprétation harmonisante pour éviter les conflits entre droit interne et international", "isCorrect": true}, {"text": "E. La Suisse considère toujours nul tout acte législatif contraire à un traité", "isCorrect": false}], "explanation": "La Suisse reconnaît la primauté du DI et du jus cogens ; exceptionnellement, Schubert tolère la violation consciente ; le TF privilégie l’interprétation harmonisante et ne déclare pas automatiquement nul tout acte interne incompatible."}, {"id": "builtin_qcm_25", "q": "Quelles affirmations sur le caractère self-executing d’une norme internationale en droit suisse sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Une norme est self-executing si elle est suffisamment précise pour être appliquée directement par un juge", "isCorrect": true}, {"text": "B. Si une norme n’est pas self-executing, une loi d’exécution interne est nécessaire avant que le juge puisse l’appliquer", "isCorrect": true}, {"text": "C. L’appréciation du caractère self-executing est une question d’interprétation judiciaire", "isCorrect": true}, {"text": "D. Toutes les dispositions des traités relatifs aux droits de l’homme sont automatiquement self-executing", "isCorrect": false}, {"text": "E. Le fait qu’une norme ne soit pas self-executing implique que l’État ne soit pas lié au niveau international", "isCorrect": false}], "explanation": "En Suisse, la précision de la norme est déterminante ; si elle n’est pas self-executing, une mise en œuvre législative est nécessaire ; l’État reste cependant lié sur le plan international."}, {"id": "builtin_qcm_26", "q": "Quels sont les éléments constitutifs de l’État selon le droit international (Convention de Montevideo 1933) ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Une population permanente", "isCorrect": true}, {"text": "B. Un territoire déterminé", "isCorrect": true}, {"text": "C. Un gouvernement effectif", "isCorrect": true}, {"text": "D. La capacité d’entrer en relations avec d’autres États (souveraineté)", "isCorrect": true}, {"text": "E. La reconnaissance par au moins 50 États membres de l’ONU", "isCorrect": false}], "explanation": "Les quatre critères classiques sont : population, territoire, gouvernement effectif et capacité d’entretenir des relations internationales. La reconnaissance n’est pas un élément constitutif mais déclaratif."}, {"id": "builtin_qcm_27", "q": "Concernant la reconnaissance d’un État en droit international, quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. La théorie déclarative affirme que la reconnaissance ne crée pas l’État, mais constate seulement son existence", "isCorrect": true}, {"text": "B. La théorie constitutive affirme que l’État n’existe juridiquement qu’à partir du moment de sa reconnaissance", "isCorrect": true}, {"text": "C. La reconnaissance est un acte discrétionnaire des États et non une obligation juridique en principe", "isCorrect": true}, {"text": "D. Le droit international impose toujours la reconnaissance immédiate de toute entité qui remplit les critères de Montevideo", "isCorrect": false}, {"text": "E. La reconnaissance implicite peut résulter de la conclusion d’un traité bilatéral formel avec la nouvelle entité", "isCorrect": true}], "explanation": "Les deux théories coexistent ; la reconnaissance est discrétionnaire ; la reconnaissance implicite peut résulter d’actes concrets comme la conclusion d’un traité bilatéral."}, {"id": "builtin_qcm_28", "q": "Quelles affirmations sur le droit à l’autodétermination des peuples sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. On distingue entre autodétermination interne (autonomie dans l’ordre étatique) et externe (sécession)", "isCorrect": true}, {"text": "B. Un peuple a toujours un droit à la sécession en vertu du droit international général", "isCorrect": false}, {"text": "C. La sécession-remède peut être invoquée en cas d’oppression grave et de négation totale des droits fondamentaux", "isCorrect": true}, {"text": "D. Le principe d’autodétermination externe s’applique principalement aux peuples coloniaux", "isCorrect": true}, {"text": "E. Une sécession réussie crée de facto un nouvel État si les critères de Montevideo sont remplis", "isCorrect": true}], "explanation": "Il n’existe pas de droit général à la sécession ; l’autodétermination externe vise surtout la décolonisation ou la sécession-remède ; un État peut naître de facto si les critères sont remplis."}, {"id": "builtin_qcm_29", "q": "Quelles propositions sur l’interdiction du recours à la force (art. 2 §4 de la Charte de l’ONU) sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elle interdit l’usage ou la menace de la force contre l’intégrité territoriale ou l’indépendance politique d’un État", "isCorrect": true}, {"text": "B. Elle s’applique uniquement à l’usage de la force militaire armée, non à la coercition économique", "isCorrect": false}, {"text": "C. Elle admet comme exception l’autorisation du Conseil de sécurité au titre du Chapitre VII", "isCorrect": true}, {"text": "D. Elle admet comme exception la légitime défense individuelle et collective au sens de l’art. 51", "isCorrect": true}, {"text": "E. Elle permet des exceptions pour des conflits de basse intensité ou des opérations de police", "isCorrect": false}], "explanation": "L’art. 2 §4 interdit la force armée ; les exceptions reconnues sont l’autorisation du CS (chap. VII) et la légitime défense (art. 51 de la Charte)."}, {"id": "builtin_qcm_30", "q": "Quelles conditions doit remplir la légitime défense au sens de l’art. 51 de la Charte de l’ONU ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elle présuppose une attaque armée en cours", "isCorrect": true}, {"text": "B. Elle doit respecter les exigences de nécessité et de proportionnalité", "isCorrect": true}, {"text": "C. Elle doit cesser dès que le Conseil de sécurité a pris les mesures nécessaires", "isCorrect": true}, {"text": "D. Elle permet tout usage de la force dès lors que l’État attaqué la qualifie de légitime défense", "isCorrect": false}, {"text": "E. Elle inclut la légitime défense préventive comme règle générale du droit international contemporain", "isCorrect": false}], "explanation": "Légitime défense : attaque armée en cours, nécessité et proportionnalité, et cessation dès l’intervention du CS ; la défense préventive n’est pas unanimement admise par le DI général."}, {"id": "builtin_qcm_31", "q": "Concernant la structure et les fonctions des Nations Unies, quelles affirmations sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Le Conseil de sécurité a la responsabilité principale du maintien de la paix et de la sécurité internationales", "isCorrect": true}, {"text": "B. Les résolutions de l’Assemblée générale sont contraignantes pour tous les États membres", "isCorrect": false}, {"text": "C. Le veto des 5 membres permanents du Conseil de sécurité s’applique aux décisions de fond, non aux décisions de procédure", "isCorrect": true}, {"text": "D. Le Secrétaire général peut prendre des décisions juridiquement contraignantes pour tous les États", "isCorrect": false}, {"text": "E. La CIJ est l’organe judiciaire principal de l’ONU et son Statut fait partie intégrante de la Charte", "isCorrect": true}], "explanation": "Le CS a la responsabilité principale en matière de paix ; le veto concerne les décisions de fond ; la CIJ est un organe principal et son Statut fait partie de la Charte ; les résolutions de l’AG sont des recommandations."}, {"id": "builtin_qcm_32", "q": "Quelles sont les caractéristiques d’une organisation internationale (OI) au sens du droit international ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A. Elle est créée par un acte juridique international (en général un traité)", "isCorrect": true}, {"text": "B. Elle est composée principalement ou exclusivement d’États", "isCorrect": true}, {"text": "C. Elle est dotée d’une structure institutionnelle propre (au moins un organe permanent)", "isCorrect": true}, {"text": "D. Elle coïncide toujours avec les États membres, sans autonomie propre", "isCorrect": false}, {"text": "E. Elle possède une personnalité juridique internationale au moins implicite", "isCorrect": true}], "explanation": "Une OI est créée par traité, composée d’États, dotée d’une structure institutionnelle propre et d’une personnalité juridique ; elle ne s’identifie pas à ses États membres."}, {"id": "builtin_qcm_33", "q": "Concernant les pouvoirs implicites des OI, quelles propositions sont correctes ?", "ch": "DIP", "fmt": "multiple", "options": [{"text": "A.
